name: admin-node-arch-vm-test

on:
  workflow_dispatch:


permissions:
  contents: read

jobs:
  arch-vm-lifecycle:
    if: false
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        scenario: [fresh-branch, upgrade-main-to-branch, restore-main-backup-with-branch]

    env:
      VM_NAME: admin-node-ci
      SSH_PORT: "2222"
      CI_MOCK_PIHOLE: "true"
      CI_MOCK_CLOUDFLARE_TUNNEL: "true"
      CI_SKIP_PUBLIC_URL_VALIDATION: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            openssh-client \
            sshpass \
            curl \
            jq

      - name: Enable KVM permissions when available
        run: |
          if [ -e /dev/kvm ]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            if ! sudo udevadm trigger --name-match=kvm; then
              echo "Warning: udev trigger for /dev/kvm failed; continuing"
            fi
            ls -l /dev/kvm
          else
            echo "KVM not available, QEMU will run without hardware acceleration"
          fi

      - name: Download Arch cloud image
        run: |
          mkdir -p .ci/vm
          curl -L \
            -o .ci/vm/arch.qcow2 \
            https://geo.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
          qemu-img resize .ci/vm/arch.qcow2 20G

      - name: Generate SSH key
        run: |
          mkdir -p .ci/ssh
          ssh-keygen -t ed25519 -N "" -f .ci/ssh/id_ed25519
          chmod 600 .ci/ssh/id_ed25519

      - name: Generate cloud-init seed
        run: |
          PUBKEY="$(cat .ci/ssh/id_ed25519.pub)"

          cat > .ci/vm/user-data <<USERDATA
          #cloud-config
          users:
            - name: admin
              groups: [wheel]
              shell: /bin/bash
              sudo: ["ALL=(ALL) NOPASSWD:ALL"]
              ssh_authorized_keys:
                - "${PUBKEY}"

          package_update: true
          packages:
            - ansible
            - git
            - docker
            - docker-compose
            - openssh
            - sops
            - age
            - restic
            - jq
            - curl
            - python
            - python-jmespath
            - python-lxml
            - python-docker
            - rsync

          runcmd:
            - [ systemctl, daemon-reload ]
            - [ systemctl, enable, --now, sshd ]
            - [ systemctl, enable, --now, docker ]
            - [ usermod, -aG, docker, admin ]
          USERDATA

          cat > .ci/vm/meta-data <<METADATA
          instance-id: ${VM_NAME}
          local-hostname: ${VM_NAME}
          METADATA

          cloud-localds .ci/vm/seed.img .ci/vm/user-data .ci/vm/meta-data

      - name: Start Arch VM
        run: |
          KVM_FLAG=""
          CPU_TYPE="qemu64"
          if [ -e /dev/kvm ]; then
            KVM_FLAG="-enable-kvm"
            CPU_TYPE="host"
          fi

          qemu-system-x86_64 \
            ${KVM_FLAG} \
            -m 4096 \
            -smp 2 \
            -cpu ${CPU_TYPE} \
            -nographic \
            -drive file=.ci/vm/arch.qcow2,format=qcow2,if=virtio \
            -drive file=.ci/vm/seed.img,format=raw,if=virtio \
            -netdev user,id=net0,hostfwd=tcp::${SSH_PORT}-:22 \
            -device virtio-net-pci,netdev=net0 \
            -serial mon:stdio \
            &> .ci/vm/qemu.log &

          echo $! > .ci/vm/qemu.pid
          echo "QEMU started with PID $(cat .ci/vm/qemu.pid) (KVM: ${KVM_FLAG:-disabled})"

      - name: Wait for VM to be ready
        timeout-minutes: 30
        run: |
          echo "Waiting for SSH on port ${SSH_PORT}..."
          for i in $(seq 1 120); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                   -o UserKnownHostsFile=/dev/null \
                   -i .ci/ssh/id_ed25519 \
                   -p ${SSH_PORT} admin@127.0.0.1 "echo ready" 2>/dev/null; then
              echo "VM SSH is ready after ${i} attempts"
              break
            fi
            if [[ $i -eq 120 ]]; then
              echo "ERROR: VM did not become ready within 600s"
              cat .ci/vm/qemu.log | tail -100
              exit 1
            fi
            sleep 5
          done

          # Wait for cloud-init to complete (packages installation)
          # Cannot use `cloud-init status --wait` because cloud-init reinstalls Python
          # during package installation, breaking the CLI. Poll for boot-finished file instead.
          echo "Waiting for cloud-init to finish..."
          for j in $(seq 1 360); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                   -o UserKnownHostsFile=/dev/null \
                   -i .ci/ssh/id_ed25519 \
                   -p ${SSH_PORT} admin@127.0.0.1 \
                   "test -f /var/lib/cloud/instance/boot-finished" 2>/dev/null; then
              echo "Cloud-init completed after ${j} polling attempts"
              break
            fi
            if [[ $j -eq 360 ]]; then
              echo "ERROR: cloud-init did not complete within 1800s"
              ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                  -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
                  "cat /var/log/cloud-init-output.log" 2>/dev/null | tail -50
              exit 1
            fi
            sleep 5
          done

      - name: Verify Docker is running in VM
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "sudo docker info"

      - name: Copy repository into VM
        run: |
          # Create tar of the repository (excluding .ci)
          tar --exclude='.ci' -czf /tmp/repo.tar.gz .

          # Copy tar to VM
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -P ${SSH_PORT} \
              /tmp/repo.tar.gz admin@127.0.0.1:/tmp/repo.tar.gz

          # Extract in VM
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "sudo mkdir -p /opt/homelab-admin-node && \
               sudo tar -xzf /tmp/repo.tar.gz -C /opt/homelab-admin-node && \
               sudo chown -R root:root /opt/homelab-admin-node && \
               sudo chmod +x /opt/homelab-admin-node/scripts/*.sh /opt/homelab-admin-node/ci/*.sh /opt/homelab-admin-node/ci/scenarios/*.sh"

      - name: Run lifecycle scenario in VM
        timeout-minutes: 30
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "sudo CI_MOCK_PIHOLE=${CI_MOCK_PIHOLE} \
                    CI_MOCK_CLOUDFLARE_TUNNEL=${CI_MOCK_CLOUDFLARE_TUNNEL} \
                    CI_SKIP_PUBLIC_URL_VALIDATION=${CI_SKIP_PUBLIC_URL_VALIDATION} \
                    SKIP_PUBLIC_URL_VALIDATION=true \
                    /opt/homelab-admin-node/ci/run-admin-lifecycle.sh ${{ matrix.scenario }}"

      - name: Show VM logs on failure
        if: failure()
        run: |
          echo "=== QEMU log (last 50 lines) ==="
          if [ -f .ci/vm/qemu.log ]; then
            tail -50 .ci/vm/qemu.log
          else
            echo "QEMU log not found"
          fi
          echo ""
          echo "=== Docker containers in VM ==="
          if ! ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "sudo docker ps -a" 2>/dev/null; then
            echo "Unable to fetch container list from VM"
          fi
          echo ""
          echo "=== Docker logs ==="
          if ! ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "for c in traefik keycloak keycloak-db openbao harbor-core; do echo \"--- \$c ---\"; sudo docker logs \$c 2>&1 | tail -20; done" 2>/dev/null; then
            echo "Unable to fetch container logs from VM"
          fi

      - name: Stop VM
        if: always()
        run: |
          if [ -f .ci/vm/qemu.pid ]; then
            if ! kill "$(cat .ci/vm/qemu.pid)" 2>/dev/null; then
              echo "QEMU process already stopped"
            fi
          fi
