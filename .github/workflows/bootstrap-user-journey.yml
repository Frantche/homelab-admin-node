name: bootstrap-user-journey

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  oidc-contracts:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ansible
        run: |
          python3 -m pip install --user ansible-core
          ~/.local/bin/ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run OIDC contract tests
        run: |
          ~/.local/bin/ansible-playbook --version
          PATH="$HOME/.local/bin:$PATH" ./ci/test-oidc-contracts.sh

  bootstrap:
    needs: oidc-contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      VM_NAME: bootstrap-ci
      SSH_PORT: "2222"
      CI_MOCK_PIHOLE: "true"
      CI_MOCK_CLOUDFLARE_TUNNEL: "true"
      CI_SKIP_PUBLIC_URL_VALIDATION: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          sudo sed -i 's#azure.archive.ubuntu.com#archive.ubuntu.com#g' /etc/apt/sources.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            openssh-client \
            sshpass \
            curl \
            jq \
            python3-yaml

      - name: Enable KVM permissions when available
        run: |
          if [ -e /dev/kvm ]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            if ! sudo udevadm trigger --name-match=kvm; then
              echo "Warning: udev trigger for /dev/kvm failed; continuing"
            fi
            ls -l /dev/kvm
          else
            echo "KVM not available, QEMU will run without hardware acceleration"
          fi

      - name: Download Arch cloud image
        run: |
          mkdir -p .ci/vm
          curl -L \
            -o .ci/vm/arch.qcow2 \
            https://geo.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
          qemu-img resize .ci/vm/arch.qcow2 20G

      - name: Generate SSH key
        run: |
          mkdir -p .ci/ssh
          ssh-keygen -t ed25519 -N "" -f .ci/ssh/id_ed25519
          chmod 600 .ci/ssh/id_ed25519

      - name: Prepare cloud-init with repository URL and branch
        env:
          REPO_URL: "https://github.com/${{ github.repository }}.git"
          REPO_BRANCH: "${{ github.head_ref || github.ref_name }}"
        run: |
          # Inject SSH key, REPO_URL, and REPO_BRANCH into the real cloud-init template.
          # The repository is NOT copied into the VM; cloud-init will git clone it.
          python3 ci/render-bootstrap-cloud-init.py

          cat > .ci/vm/meta-data <<METADATA
          instance-id: ${VM_NAME}
          local-hostname: ${VM_NAME}
          METADATA

          cloud-localds .ci/vm/seed.img .ci/vm/user-data .ci/vm/meta-data

      - name: Start Arch VM
        run: |
          KVM_FLAG=""
          CPU_TYPE="qemu64"
          if [ -e /dev/kvm ]; then
            KVM_FLAG="-enable-kvm"
            CPU_TYPE="host"
          fi

          qemu-system-x86_64 \
            ${KVM_FLAG} \
            -m 4096 \
            -smp 2 \
            -cpu ${CPU_TYPE} \
            -nographic \
            -drive file=.ci/vm/arch.qcow2,format=qcow2,if=virtio \
            -drive file=.ci/vm/seed.img,format=raw,if=virtio \
            -netdev user,id=net0,hostfwd=tcp::${SSH_PORT}-:22 \
            -device virtio-net-pci,netdev=net0 \
            -serial mon:stdio \
            &> .ci/vm/qemu.log &

          echo $! > .ci/vm/qemu.pid
          echo "QEMU started with PID $(cat .ci/vm/qemu.pid) (KVM: ${KVM_FLAG:-disabled})"

      - name: Wait for VM SSH to be ready
        timeout-minutes: 15
        run: |
          echo "Waiting for SSH on port ${SSH_PORT}..."
          for i in $(seq 1 180); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                   -o UserKnownHostsFile=/dev/null \
                   -i .ci/ssh/id_ed25519 \
                   -p ${SSH_PORT} admin@127.0.0.1 "echo ready" 2>/dev/null; then
              echo "VM SSH is ready after ${i} attempts"
              break
            fi
            if [[ $i -eq 180 ]]; then
              echo "ERROR: VM did not become ready within 900s"
              tail -50 .ci/vm/qemu.log
              exit 1
            fi
            sleep 5
          done

      - name: Wait for cloud-init to complete
        timeout-minutes: 30
        run: |
          # Cannot use `cloud-init status --wait` because cloud-init reinstalls Python
          # during package installation, breaking the CLI. Poll for boot-finished instead.
          echo "Waiting for cloud-init to finish (repo clone + package install)..."
          for j in $(seq 1 360); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                   -o UserKnownHostsFile=/dev/null \
                   -i .ci/ssh/id_ed25519 \
                   -p ${SSH_PORT} admin@127.0.0.1 \
                   "test -f /var/lib/cloud/instance/boot-finished" 2>/dev/null; then
              echo "Cloud-init completed after ${j} polling attempts"
              break
            fi
            if [[ $j -eq 360 ]]; then
              echo "ERROR: cloud-init did not complete within 1800s"
              ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                  -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
                  "cat /var/log/cloud-init-output.log" 2>/dev/null | tail -50
              exit 1
            fi
            sleep 5
          done

      - name: Verify repository cloned in /opt/homelab-admin-node
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "test -d /opt/homelab-admin-node/.git && \
               sudo /opt/homelab-admin-node/scripts/build-admin-node.sh >/dev/null && \
               test -x /opt/homelab-admin-node/bin/admin-node"
          echo "Repository successfully cloned at /opt/homelab-admin-node"

      - name: Verify VM is in locked mode
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "grep -q locked /etc/admin-node/mode"
          echo "VM is in locked mode as expected"

      - name: Initialize CI config repo from examples
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "sudo ADMIN_REPO_URL='https://github.com/${{ github.repository }}.git' \
                    /opt/homelab-admin-node/ci/setup-bootstrap-config-repo.sh"

      - name: Run bootstrap user journey in VM
        timeout-minutes: 45
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "sudo CI_MOCK_PIHOLE=${CI_MOCK_PIHOLE} \
                    CI_MOCK_CLOUDFLARE_TUNNEL=${CI_MOCK_CLOUDFLARE_TUNNEL} \
                    CI_SKIP_PUBLIC_URL_VALIDATION=${CI_SKIP_PUBLIC_URL_VALIDATION} \
                    SKIP_PUBLIC_URL_VALIDATION=true \
                    /opt/homelab-admin-node/ci/scenarios/bootstrap-user-journey.sh"

      - name: Snapshot validated OTLP mock payloads
        run: |
          mkdir -p .ci/artifacts/bootstrap/otel-mock-validated

          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "sudo tar -C /tmp -czf /tmp/admin-node-otel-mock-validated.tgz admin-node-otel-mock-bootstrap-user-journey && \
               sudo chown admin:admin /tmp/admin-node-otel-mock-validated.tgz && \
               sudo chown -R admin:admin /tmp/admin-node-otel-mock-bootstrap-user-journey"
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -P ${SSH_PORT} \
              admin@127.0.0.1:/tmp/admin-node-otel-mock-validated.tgz \
              .ci/artifacts/bootstrap/admin-node-otel-mock-validated.tgz
          scp -r -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -P ${SSH_PORT} \
              admin@127.0.0.1:/tmp/admin-node-otel-mock-bootstrap-user-journey/. \
              .ci/artifacts/bootstrap/otel-mock-validated/

      - name: Verify validated OTLP mock artifact content
        run: |
          metrics_file=.ci/artifacts/bootstrap/otel-mock-validated/metrics.received
          logs_file=.ci/artifacts/bootstrap/otel-mock-validated/logs.received

          test -s "$metrics_file"
          test -s "$logs_file"

          for marker in \
            '"key":"service.name","value":{"stringValue":"gitea"}' \
            '"key":"service.name","value":{"stringValue":"harbor-core"}' \
            '"key":"service.name","value":{"stringValue":"harbor-exporter"}' \
            '"key":"service.name","value":{"stringValue":"openbao"}' \
            '"key":"service.name","value":{"stringValue":"traefik"}'
          do
            grep -Fq "$marker" "$metrics_file"
          done

          grep -Fq "admin-node-otel-log-sentinel" "$logs_file"

      - name: Ensure AppArmor convergence after reboot
        timeout-minutes: 25
        run: |
          SSH_OPTS=(
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -i .ci/ssh/id_ed25519
            -p ${SSH_PORT}
          )

          run_ssh() {
            ssh "${SSH_OPTS[@]}" admin@127.0.0.1 "$@"
          }

          wait_for_ssh_up() {
            for i in $(seq 1 120); do
              if run_ssh "echo ready" >/dev/null 2>&1; then
                echo "VM SSH is ready after reboot"
                return 0
              fi
              sleep 5
            done
            echo "ERROR: VM did not come back over SSH after reboot" >&2
            return 1
          }

          wait_for_ssh_down() {
            for i in $(seq 1 60); do
              if ! run_ssh "echo ready" >/dev/null 2>&1; then
                echo "VM SSH went down for reboot"
                return 0
              fi
              sleep 2
            done
            echo "WARNING: VM SSH did not go down while waiting for reboot"
            return 0
          }

          stop_auto_converge() {
            run_ssh "sudo systemctl disable --now admin-converge.timer admin-unlock.path 2>/dev/null || true; sudo systemctl stop admin-converge.service 2>/dev/null || true"
          }

          run_apparmor_converge() {
            run_ssh "sudo CI_MOCK_PIHOLE=${CI_MOCK_PIHOLE} \
                           CI_MOCK_CLOUDFLARE_TUNNEL=${CI_MOCK_CLOUDFLARE_TUNNEL} \
                           CI_SKIP_PUBLIC_URL_VALIDATION=${CI_SKIP_PUBLIC_URL_VALIDATION} \
                           SKIP_PUBLIC_URL_VALIDATION=true \
                           ansible-playbook \
                           -i /etc/admin-config/homelab-node-admin-config/hosts/inventory.ini \
                           /opt/homelab-admin-node/ansible/site.yml \
                           -e @/etc/admin-config/homelab-node-admin-config/hosts/group_vars/ci-bootstrap-vars.yml \
                           -e admin_apparmor_ci_manage_runtime=true \
                           -e admin_apparmor_ci_defer_reboot=true \
                           -e admin_ci_disable_auto_converge=true"
          }

          stop_auto_converge
          echo "Running convergence before AppArmor audit"
          run_apparmor_converge

          if run_ssh '[[ -f /etc/admin-node/apparmor-reboot-requested ]] || [[ "$(cat /sys/module/apparmor/parameters/enabled 2>/dev/null || echo N)" != "Y" ]]'; then
            echo "AppArmor requires a VM reboot before hardening validation"
            run_ssh "sudo shutdown -r now" || true
            wait_for_ssh_down
            wait_for_ssh_up

            stop_auto_converge
            echo "Running post-reboot convergence"
            run_apparmor_converge
          else
            echo "AppArmor is already active; no reboot required"
          fi

          run_ssh 'test "$(cat /sys/module/apparmor/parameters/enabled 2>/dev/null)" = "Y"'

      - name: Run hardening audit in VM
        timeout-minutes: 10
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "sudo /opt/homelab-admin-node/ci/run-hardening-audit.sh"

      - name: Collect hardening audit reports
        if: always()
        run: |
          mkdir -p .ci/artifacts
          if ! scp -r -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -P ${SSH_PORT} \
              admin@127.0.0.1:/opt/homelab-admin-node/ci/lynis \
              .ci/artifacts/; then
            echo "Hardening audit reports were not available"
          fi

      - name: Upload hardening audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-audit
          path: .ci/artifacts/lynis
          if-no-files-found: ignore

      - name: Collect bootstrap logs
        if: always()
        run: |
          mkdir -p .ci/artifacts/bootstrap

          if [ -f .ci/vm/qemu.log ]; then
            cp .ci/vm/qemu.log .ci/artifacts/bootstrap/qemu.log
          fi

          SSH_OPTS=(
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ConnectTimeout=5
            -i .ci/ssh/id_ed25519
            -p ${SSH_PORT}
          )

          if ssh "${SSH_OPTS[@]}" admin@127.0.0.1 "echo ready" >/dev/null 2>&1; then
            ssh "${SSH_OPTS[@]}" admin@127.0.0.1 "sudo cat /var/log/cloud-init-output.log" \
              > .ci/artifacts/bootstrap/cloud-init-output.log 2>/dev/null || true
            ssh "${SSH_OPTS[@]}" admin@127.0.0.1 "sudo journalctl --no-pager" \
              > .ci/artifacts/bootstrap/journal.log 2>/dev/null || true
            ssh "${SSH_OPTS[@]}" admin@127.0.0.1 "sudo journalctl -u admin-converge.service --no-pager" \
              > .ci/artifacts/bootstrap/admin-converge.log 2>/dev/null || true
            ssh "${SSH_OPTS[@]}" admin@127.0.0.1 "sudo docker ps -a" \
              > .ci/artifacts/bootstrap/docker-ps.txt 2>/dev/null || true
            ssh "${SSH_OPTS[@]}" admin@127.0.0.1 \
              "for c in \$(sudo docker ps -a --format '{{.Names}}'); do echo \"--- \$c ---\"; sudo docker logs \$c 2>&1; done" \
              > .ci/artifacts/bootstrap/docker-logs.txt 2>/dev/null || true
            ssh "${SSH_OPTS[@]}" admin@127.0.0.1 \
              "sudo tar -C /tmp -czf /tmp/admin-node-otel-mock.tgz admin-node-otel-mock-bootstrap-user-journey 2>/dev/null || true"
            scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -P ${SSH_PORT} \
              admin@127.0.0.1:/tmp/admin-node-otel-mock.tgz \
              .ci/artifacts/bootstrap/admin-node-otel-mock.tgz 2>/dev/null || true
            mkdir -p .ci/artifacts/bootstrap/otel-mock
            scp -r -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -P ${SSH_PORT} \
              admin@127.0.0.1:/tmp/admin-node-otel-mock-bootstrap-user-journey/. \
              .ci/artifacts/bootstrap/otel-mock/ 2>/dev/null || true
            scp -r -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -P ${SSH_PORT} \
              admin@127.0.0.1:/opt/homelab-admin-node/ci/oidc-user-journey/test-results \
              .ci/artifacts/bootstrap/playwright-test-results 2>/dev/null || true
            scp -r -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -P ${SSH_PORT} \
              admin@127.0.0.1:/opt/homelab-admin-node/ci/oidc-user-journey/playwright-report \
              .ci/artifacts/bootstrap/playwright-report 2>/dev/null || true
          else
            echo "VM SSH unavailable; only host-side logs were collected" \
              > .ci/artifacts/bootstrap/collection-warning.txt
          fi

      - name: Upload bootstrap logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-user-journey-logs
          path: .ci/artifacts/bootstrap
          if-no-files-found: ignore

      - name: Show VM logs on failure
        if: failure()
        run: |
          echo "=== QEMU log (last 50 lines) ==="
          if [ -f .ci/vm/qemu.log ]; then
            tail -50 .ci/vm/qemu.log
          else
            echo "QEMU log not found"
          fi
          echo ""
          echo "=== Cloud-init output log (last 80 lines) ==="
          if ! ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "cat /var/log/cloud-init-output.log" 2>/dev/null | tail -80; then
            echo "Unable to fetch cloud-init log"
          fi
          echo ""
          echo "=== Docker containers in VM ==="
          if ! ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "sudo docker ps -a" 2>/dev/null; then
            echo "Unable to fetch container list from VM"
          fi
          echo ""
          echo "=== Docker logs ==="
          if ! ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i .ci/ssh/id_ed25519 -p ${SSH_PORT} admin@127.0.0.1 \
              "for c in traefik keycloak keycloak-db openbao harbor-core; do echo \"--- \$c ---\"; sudo docker logs \$c 2>&1 | tail -20; done" 2>/dev/null; then
            echo "Unable to fetch container logs from VM"
          fi

      - name: Stop VM
        if: always()
        run: |
          if [ -f .ci/vm/qemu.pid ]; then
            if ! kill "$(cat .ci/vm/qemu.pid)" 2>/dev/null; then
              echo "QEMU process already stopped"
            fi
          fi
