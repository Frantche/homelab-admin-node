---
- hosts: admin
  become: true
  gather_facts: true

  pre_tasks:
    - name: Check inventory configuration vars
      ansible.builtin.stat:
        path: "{{ inventory_dir }}/group_vars/all.yml"
      register: inventory_config_file

    - name: Load inventory configuration vars
      ansible.builtin.include_vars:
        file: "{{ inventory_dir }}/group_vars/all.yml"
      when: inventory_config_file.stat.exists

    - name: Check encrypted inventory secrets
      ansible.builtin.stat:
        path: "{{ inventory_dir }}/group_vars/secrets.sops.yaml"
      register: inventory_secrets_file
      no_log: true

    - name: Decrypt encrypted inventory secrets
      ansible.builtin.command: sops --decrypt --output-type json {{ inventory_dir }}/group_vars/secrets.sops.yaml
      environment:
        SOPS_AGE_KEY_FILE: /etc/sops/age/keys.txt
      register: inventory_secrets
      changed_when: false
      check_mode: false
      when: inventory_secrets_file.stat.exists
      no_log: true

    - name: Expose encrypted scalar secret references
      ansible.builtin.set_fact:
        vault_oidc_harbor_client_secret: "{{ decrypted_inventory_secrets.vault_oidc_harbor_client_secret | default(vault_oidc_harbor_client_secret | default('')) }}"
        vault_oidc_openbao_client_secret: "{{ decrypted_inventory_secrets.vault_oidc_openbao_client_secret | default(vault_oidc_openbao_client_secret | default('')) }}"
        vault_oidc_gitea_client_secret: "{{ decrypted_inventory_secrets.vault_oidc_gitea_client_secret | default(vault_oidc_gitea_client_secret | default('')) }}"
        vault_registry_mirror_private_username: "{{ decrypted_inventory_secrets.vault_registry_mirror_private_username | default(vault_registry_mirror_private_username | default('')) }}"
        vault_registry_mirror_private_password: "{{ decrypted_inventory_secrets.vault_registry_mirror_private_password | default(vault_registry_mirror_private_password | default('')) }}"
      vars:
        decrypted_inventory_secrets: "{{ inventory_secrets.stdout | from_json }}"
      when: inventory_secrets_file.stat.exists
      no_log: true

    - name: Merge encrypted service secrets
      ansible.builtin.set_fact:
        admin: "{{ admin | default({}) | combine(decrypted_inventory_secrets.admin | default({}), recursive=True) }}"
        pihole: "{{ pihole | default({}) | combine(decrypted_inventory_secrets.pihole | default({}), recursive=True) }}"
        cloudflare: "{{ cloudflare | default({}) | combine(decrypted_inventory_secrets.cloudflare | default({}), recursive=True) }}"
        openbao: "{{ openbao | default({}) | combine(decrypted_inventory_secrets.openbao | default({}), recursive=True) }}"
        keycloak: "{{ keycloak | default({}) | combine(decrypted_inventory_secrets.keycloak | default({}), recursive=True) }}"
        harbor: "{{ harbor | default({}) | combine(decrypted_inventory_secrets.harbor | default({}), recursive=True) }}"
        gitea: "{{ gitea | default({}) | combine(decrypted_inventory_secrets.gitea | default({}), recursive=True) }}"
        backup: "{{ backup | default({}) | combine(decrypted_inventory_secrets.backup | default({}), recursive=True) }}"
      vars:
        decrypted_inventory_secrets: "{{ inventory_secrets.stdout | from_json }}"
      when: inventory_secrets_file.stat.exists
      no_log: true

    - name: Merge encrypted configuration secrets
      ansible.builtin.set_fact:
        openbao_config: "{{ openbao_config | default({}) | combine(decrypted_inventory_secrets.openbao_config | default({}), recursive=True) }}"
        keycloak_config: "{{ keycloak_config | default({}) | combine(decrypted_inventory_secrets.keycloak_config | default({}), recursive=True) }}"
        harbor_config: "{{ harbor_config | default({}) | combine(decrypted_inventory_secrets.harbor_config | default({}), recursive=True) }}"
        gitea_config: "{{ gitea_config | default({}) | combine(decrypted_inventory_secrets.gitea_config | default({}), recursive=True) }}"
        oidc_clients: "{{ oidc_clients | default({}) | combine(decrypted_inventory_secrets.oidc_clients | default({}), recursive=True) }}"
        observability: "{{ observability | default({}) | combine(decrypted_inventory_secrets.observability | default({}), recursive=True) }}"
      vars:
        decrypted_inventory_secrets: "{{ inventory_secrets.stdout | from_json }}"
      when: inventory_secrets_file.stat.exists
      no_log: true

    - name: Ensure admin-node mode file exists in safe mode
      ansible.builtin.copy:
        dest: "{{ admin_mode_file }}"
        content: "locked\n"
        force: false
        owner: root
        group: root
        mode: "0644"

    - name: Read current mode
      ansible.builtin.slurp:
        path: "{{ admin_mode_file }}"
      register: mode_file

    - name: Classify current admin-node mode
      ansible.builtin.set_fact:
        admin_mode_raw: "{{ (mode_file.content | b64decode | trim) | default('locked', true) }}"
        admin_mode_invalid: "{{ (mode_file.content | b64decode | trim) not in ['locked', 'init', 'normal', 'restore', 'restore_failed'] }}"

    - name: Force invalid mode into locked state
      ansible.builtin.copy:
        dest: "{{ admin_mode_file }}"
        content: "locked\n"
        owner: root
        group: root
        mode: "0644"
      when: admin_mode_invalid | bool

    - name: Set effective admin mode
      ansible.builtin.set_fact:
        admin_mode: "{{ 'locked' if (admin_mode_invalid | bool) else admin_mode_raw }}"

  roles:
    - base
    - arch
    - role: hardening
      when: hardening.enabled | default(true)
    - firewall
    - docker
    - storage
    - role: optional_stacks
      when: admin_mode in ['init', 'normal']
    - role: locked
      when: admin_mode == 'locked'
    - role: init
      when: admin_mode == 'init'
    - role: observability
      when: admin_mode in ['init', 'normal'] and (observability.enabled | default(false))
    - role: traefik
      when: admin_mode in ['init', 'normal', 'restore']
    - role: openbao
      when: admin_mode in ['init', 'normal', 'restore']
    - role: keycloak
      when: admin_mode in ['init', 'normal', 'restore']
    - role: gitea
      when: admin_mode in ['init', 'normal', 'restore']
    - role: keycloak_config
      when: admin_mode == 'normal' and (keycloak_config.enabled | default(false))
    - role: openbao_config
      when: admin_mode == 'normal' and (openbao_config.enabled | default(false))
    - role: harbor
      when: admin_mode in ['init', 'normal', 'restore']
    - role: restore
      when: admin_mode == 'restore'
    - role: harbor_config
      when: admin_mode == 'normal' and (harbor_config.enabled | default(false))
    - role: gitea_config
      when: admin_mode == 'normal' and (gitea_config.enabled | default(false))
    - role: cloudflare
      when: admin_mode in ['init', 'normal'] and ((cloudflare.enabled | default(true)) | bool)
    - role: pihole_dns
      when: admin_mode in ['init', 'normal'] and not (ci_mode | default(false)) and ((pihole.enabled | default(true)) | bool)
    - role: validate_apis
      when: admin_mode in ['init', 'normal']
    - role: backup
      when: admin_mode == 'normal'

  post_tasks:
    - name: Report invalid mode after enforcing locked state
      ansible.builtin.fail:
        msg: "Invalid admin-node mode '{{ admin_mode_raw }}'; the host was forced into locked mode."
      when: admin_mode_invalid | bool
