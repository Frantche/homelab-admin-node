---
- name: Ensure openbao stack directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/openbao"
    state: directory
    mode: "0755"

- name: Copy openbao stack files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../stacks/openbao/"
    dest: "{{ admin_node_root }}/stacks/openbao/"
    mode: preserve

- name: Ensure openbao config is readable by the container user
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/openbao/openbao.hcl"
    owner: root
    group: root
    mode: "0644"

- name: Render openbao compose
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/openbao/compose.yaml"
    dest: "{{ admin_node_root }}/stacks/openbao/compose.yaml"
    mode: "0644"

- name: Render openbao env
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/env/openbao.env"
    mode: "0600"
    content: |
      OPENBAO_ADDR=https://{{ service_domains.openbao }}
  no_log: true

- name: Start openbao stack
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/openbao.env -f compose.yaml up -d
  args:
    chdir: "{{ admin_node_root }}/stacks/openbao"
  changed_when: true

- name: Initialize openbao when entering init mode
  ansible.builtin.command: /opt/homelab-admin-node/bin/admin-node openbao init-if-needed
  register: openbao_init_result
  changed_when: "'wrote encrypted unseal secrets' in openbao_init_result.stdout"
  when: admin_mode == 'init' and not (ci_mode | default(false))

- name: Unseal openbao
  ansible.builtin.command: /opt/homelab-admin-node/bin/admin-node openbao unseal
  changed_when: false
  when: admin_mode != 'init' or not (ci_mode | default(false))
