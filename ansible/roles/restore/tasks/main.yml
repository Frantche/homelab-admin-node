---
- name: Execute restore
  ansible.builtin.command: /opt/homelab-admin-node/bin/admin-node restore run
  environment:
    ADMIN_NODE_LAN_IP: "{{ admin_node_lan_ip }}"
    KEYCLOAK_DOMAIN: "{{ service_domains.keycloak }}"
    HARBOR_DOMAIN: "{{ service_domains.harbor }}"
    GITEA_DOMAIN: "{{ service_domains.gitea }}"
    TRAEFIK_DOMAIN: "{{ service_domains.traefik }}"
    OPENBAO_DOMAIN: "{{ service_domains.openbao }}"
    CI_MODE: "{{ 'true' if (ci_mode | default(false)) else 'false' }}"
    CI_MOCK_PIHOLE: "{{ 'true' if ((ci.mock_pihole | default(false)) | bool) else 'false' }}"
    CI_MOCK_CLOUDFLARE_TUNNEL: "{{ 'true' if ((ci.mock_cloudflare_tunnel | default(false)) | bool) else 'false' }}"
    CI_SKIP_PUBLIC_URL_VALIDATION: "{{ 'true' if ((ci.skip_public_url_validation | default(false)) | bool) else 'false' }}"
    PIHOLE_ENABLED: "{{ 'true' if ((pihole.enabled | default(true)) | bool) else 'false' }}"
    CLOUDFLARE_ENABLED: "{{ 'true' if ((cloudflare.enabled | default(true)) | bool) else 'false' }}"
  register: restore_result
  changed_when: false
  failed_when: restore_result.rc != 0 and admin_mode != 'restore_failed'
