---
- name: Wait for Keycloak readiness
  ansible.builtin.uri:
    url: http://127.0.0.1:9000/health/ready
    method: GET
    status_code: 200
  register: keycloak_ready
  until: keycloak_ready.status == 200
  retries: 30
  delay: 5

- name: Request Keycloak admin token
  ansible.builtin.uri:
    url: "http://127.0.0.1:9000/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: password
      client_id: admin-cli
      username: "{{ keycloak.admin_user | default('admin') }}"
      password: "{{ keycloak.admin_password | mandatory('keycloak.admin_password is required for keycloak_config role') }}"
    return_content: true
    status_code: 200
  register: keycloak_token_response
  no_log: true

- name: Set Keycloak facts
  ansible.builtin.set_fact:
    keycloak_admin_token: "{{ keycloak_token_response.json.access_token }}"
    keycloak_auth_header: "{{ 'Bearer ' ~ keycloak_token_response.json.access_token }}"
    keycloak_realm_cfg: "{{ keycloak_config.realm }}"

- name: Check if configured realm exists
  ansible.builtin.uri:
    url: "http://127.0.0.1:9000/admin/realms/{{ keycloak_realm_cfg.name }}"
    method: GET
    headers:
      Authorization: "{{ keycloak_auth_header }}"
    status_code: [200, 404]
  register: keycloak_realm_state

- name: Create configured realm
  ansible.builtin.uri:
    url: "http://127.0.0.1:9000/admin/realms"
    method: POST
    headers:
      Authorization: "{{ keycloak_auth_header }}"
    body_format: json
    body:
      realm: "{{ keycloak_realm_cfg.name }}"
      displayName: "{{ keycloak_realm_cfg.display_name | default(keycloak_realm_cfg.name) }}"
      enabled: true
      sslRequired: "{{ keycloak_realm_cfg.ssl_required | default('external') }}"
    status_code: 201
  when: keycloak_realm_state.status == 404

- name: Update configured realm
  ansible.builtin.uri:
    url: "http://127.0.0.1:9000/admin/realms/{{ keycloak_realm_cfg.name }}"
    method: PUT
    headers:
      Authorization: "{{ keycloak_auth_header }}"
    body_format: json
    body:
      realm: "{{ keycloak_realm_cfg.name }}"
      displayName: "{{ keycloak_realm_cfg.display_name | default(keycloak_realm_cfg.name) }}"
      enabled: true
      sslRequired: "{{ keycloak_realm_cfg.ssl_required | default('external') }}"
    status_code: 204
  when: keycloak_realm_state.status == 200

- name: Check existing realm roles
  ansible.builtin.uri:
    url: "http://127.0.0.1:9000/admin/realms/{{ keycloak_realm_cfg.name }}/roles/{{ item }}"
    method: GET
    headers:
      Authorization: "{{ keycloak_auth_header }}"
    status_code: [200, 404]
  loop: "{{ keycloak_config.realm_roles | default([]) }}"
  register: keycloak_realm_roles_state

- name: Create missing realm roles
  ansible.builtin.uri:
    url: "http://127.0.0.1:9000/admin/realms/{{ keycloak_realm_cfg.name }}/roles"
    method: POST
    headers:
      Authorization: "{{ keycloak_auth_header }}"
    body_format: json
    body:
      name: "{{ item.item }}"
    status_code: 201
  loop: "{{ keycloak_realm_roles_state.results | default([]) }}"
  when: item.status == 404

- name: Ensure configured clients exist
  ansible.builtin.include_tasks: client.yml
  loop: "{{ keycloak_config.clients | default([]) }}"
  loop_control:
    loop_var: keycloak_client_item
    label: "{{ keycloak_client_item.client_id }}"

- name: Ensure configured users exist and are updated
  ansible.builtin.include_tasks: user.yml
  loop: "{{ keycloak_config.users | default([]) }}"
  loop_control:
    loop_var: keycloak_user_item
    label: "{{ keycloak_user_item.username }}"
