---
- name: Build client specification
  ansible.builtin.set_fact:
    keycloak_client_spec:
      clientId: "{{ keycloak_client_item.client_id }}"
      name: "{{ keycloak_client_item.name | default(keycloak_client_item.client_id) }}"
      enabled: "{{ keycloak_client_item.enabled | default(true) }}"
      publicClient: "{{ keycloak_client_item.public | default(false) }}"
      standardFlowEnabled: "{{ keycloak_client_item.standard_flow_enabled | default(true) }}"
      directAccessGrantsEnabled: "{{ keycloak_client_item.direct_access_grants_enabled | default(false) }}"
      serviceAccountsEnabled: "{{ keycloak_client_item.service_accounts_enabled | default(false) }}"
      redirectUris: "{{ keycloak_client_item.redirect_uris | default([]) }}"
      webOrigins: "{{ keycloak_client_item.web_origins | default([]) }}"
      rootUrl: "{{ keycloak_client_item.root_url | default(omit) }}"
      baseUrl: "{{ keycloak_client_item.base_url | default(omit) }}"
      secret: "{{ keycloak_client_item.secret | default(omit) }}"

- name: Find client
  ansible.builtin.uri:
    url: "http://127.0.0.1:9000/admin/realms/{{ keycloak_realm_cfg.name }}/clients?clientId={{ keycloak_client_item.client_id | urlencode }}"
    method: GET
    headers:
      Authorization: "{{ keycloak_auth_header }}"
    status_code: 200
  register: keycloak_client_lookup

- name: Set client id fact
  ansible.builtin.set_fact:
    keycloak_client_id: "{{ (keycloak_client_lookup.json | first).id if (keycloak_client_lookup.json | length) > 0 else '' }}"

- name: Create client when missing
  ansible.builtin.uri:
    url: "http://127.0.0.1:9000/admin/realms/{{ keycloak_realm_cfg.name }}/clients"
    method: POST
    headers:
      Authorization: "{{ keycloak_auth_header }}"
    body_format: json
    body: "{{ keycloak_client_spec }}"
    status_code: 201
  when: (keycloak_client_lookup.json | length) == 0

- name: Update client when present
  ansible.builtin.uri:
    url: "http://127.0.0.1:9000/admin/realms/{{ keycloak_realm_cfg.name }}/clients/{{ keycloak_client_id }}"
    method: PUT
    headers:
      Authorization: "{{ keycloak_auth_header }}"
    body_format: json
    body: "{{ keycloak_client_spec }}"
    status_code: 204
  when: keycloak_client_id | length > 0
