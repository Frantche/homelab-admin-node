---
- name: Ensure cloudflared stack directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/cloudflared"
    state: directory
    mode: "0755"

- name: Copy cloudflared stack files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../stacks/cloudflared/"
    dest: "{{ admin_node_root }}/stacks/cloudflared/"
    owner: root
    group: root
    mode: preserve

- name: Render cloudflared compose
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/cloudflared/compose.yaml"
    dest: "{{ admin_node_root }}/stacks/cloudflared/compose.yaml"
    owner: root
    group: root
    mode: "0644"

- name: Render cloudflared env
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/env/cloudflared.env"
    mode: "0600"
    content: |
      CLOUDFLARE_TUNNEL_TOKEN={{ cloudflare.tunnel_token | mandatory('cloudflare.tunnel_token is required') }}
  no_log: true

- name: Recreate cloudflared mock container when AppArmor becomes active
  ansible.builtin.command: docker rm -f cloudflared
  when:
    - ci_mode | default(false) | bool
    - hardening.apparmor.enabled | default(true) | bool
    - admin_apparmor_runtime_active | default(false) | bool
    - (hardening.apparmor.profiles | default({})).cloudflared | default(true) | bool
  register: remove_mock_cloudflared
  failed_when: false
  changed_when: remove_mock_cloudflared.rc == 0

- name: Start cloudflared mock container (CI mode)
  ansible.builtin.command: >-
    docker run -d --name cloudflared --network admin-net --restart no
    {% if (hardening.apparmor.enabled | default(true) | bool) and (admin_apparmor_runtime_active | default(false) | bool) and ((hardening.apparmor.profiles | default({})).cloudflared | default(true) | bool) %}
    --security-opt apparmor=admin-node-cloudflared
    {% endif %}
    alpine sleep 3600
  when: ci_mode | default(false) | bool
  register: mock_cloudflared
  failed_when: false
  changed_when: mock_cloudflared.rc == 0

- name: Start cloudflared stack (production)
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/cloudflared.env -f compose.yaml up -d
  args:
    chdir: "{{ admin_node_root }}/stacks/cloudflared"
  when: not (ci_mode | default(false))
  changed_when: true
