---
- name: Ensure /etc/docker exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure docker log rotation
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Ensure docker service enabled
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Flush handlers to restart docker before starting containers
  ansible.builtin.meta: flush_handlers

- name: Ensure admin-net Docker network exists
  community.docker.docker_network:
    name: admin-net
    state: present

- name: Probe Docker bridge networking support
  ansible.builtin.command: docker run --rm --network admin-net alpine:3.20 true
  register: docker_bridge_probe
  failed_when: false
  changed_when: docker_bridge_probe.rc == 0

- name: Record Docker bridge support
  ansible.builtin.set_fact:
    docker_bridge_supported: "{{ docker_bridge_probe.rc == 0 }}"

- name: Fail when Docker bridge networking is unavailable
  ansible.builtin.fail:
    msg: >-
      Docker bridge networking is unavailable in this environment.
      The admin stack requires bridge-capable container networking
      to start traefik, openbao, keycloak, harbor, and cloudflared.
      The probe command that failed was: docker run --rm --network admin-net alpine:3.20 true
  when: not docker_bridge_supported
