---
- name: Ensure /etc/docker exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure docker log rotation
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Ensure docker service enabled
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Ensure admin-net Docker network exists
  community.docker.docker_network:
    name: admin-net
    state: present
