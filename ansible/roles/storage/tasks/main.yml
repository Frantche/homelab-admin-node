---
- name: Ensure data directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ admin_node_root }}/data/keycloak"
    - "{{ admin_node_root }}/data/openbao"
    - "{{ admin_node_root }}/data/harbor"
    - "{{ admin_node_root }}/data/traefik"
    - "{{ admin_node_root }}/data/cloudflared"
