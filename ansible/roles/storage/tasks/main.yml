---
- name: Build storage isolation configuration
  ansible.builtin.set_fact:
    storage_isolation_cfg: >-
      {{
        {
          'enabled': false,
          'backend': 'auto',
          'migrate_existing': false,
          'lvm': {
            'volume_group': '',
            'filesystem': 'ext4'
          },
          'entries': []
        } | combine(storage_isolation | default({}), recursive=True)
      }}

- name: Validate storage isolation backend
  ansible.builtin.assert:
    that:
      - storage_isolation_cfg.backend in ['auto', 'btrfs', 'lvm']
    fail_msg: "storage_isolation.backend must be one of: auto, btrfs, lvm"
  when: storage_isolation_cfg.enabled | bool

- name: Migrate Gitea into one atomic Btrfs stack subvolume
  ansible.builtin.include_tasks: gitea-stack-btrfs-migrate.yml
  when:
    - storage_isolation_cfg.enabled | bool
    - storage_isolation_cfg.backend in ['auto', 'btrfs']
    - backup.require_btrfs_hot | default(false) | bool

- name: Configure isolated storage entries
  ansible.builtin.include_tasks: storage-isolation-entry.yml
  loop: "{{ storage_isolation_cfg.entries }}"
  loop_control:
    loop_var: storage_isolation_entry
    label: "{{ storage_isolation_entry.name | default(storage_isolation_entry.path | default('unnamed')) }}"
  when: storage_isolation_cfg.enabled | bool

- name: Ensure data directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - { path: "{{ admin_node_root }}/data/keycloak" }
    - { path: "{{ admin_node_root }}/data/openbao", owner: "100", group: "1000", mode: "0750" }
    - { path: "{{ admin_node_root }}/data/harbor" }
    - { path: "{{ admin_node_root }}/data/gitea-stack/gitea" }
    - { path: "{{ admin_node_root }}/data/gitea-stack/postgres" }
    - { path: "{{ admin_node_root }}/data/traefik" }
    - { path: "{{ admin_node_root }}/data/cloudflared" }

- name: Ensure openbao data directory is writable before restore can start
  ansible.builtin.file:
    path: "{{ admin_node_root }}/data/openbao"
    state: directory
    owner: "100"
    group: "1000"
    mode: "0750"

- name: Ensure existing openbao data ownership before restore can start
  ansible.builtin.file:
    path: "{{ admin_node_root }}/data/openbao"
    owner: "100"
    group: "1000"
    recurse: true

- name: Normalize openbao data directory modes before restore can start
  ansible.builtin.command: find {{ admin_node_root }}/data/openbao -type d -exec chmod 0750 {} +
  changed_when: false

- name: Normalize openbao data file modes before restore can start
  ansible.builtin.command: find {{ admin_node_root }}/data/openbao -type f -exec chmod 0600 {} +
  changed_when: false

- name: Ensure letsencrypt storage directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/data/traefik/letsencrypt"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure TLS certificate directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/certs"
    state: directory
    owner: root
    group: root
    mode: "0700"
