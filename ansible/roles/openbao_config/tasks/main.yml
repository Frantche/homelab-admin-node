---
- name: Check generated OpenBao unseal secrets
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../secrets/openbao-unseal.sops.yaml"
  register: openbao_generated_secrets_file
  no_log: true

- name: Decrypt generated OpenBao unseal secrets
  ansible.builtin.command: sops --decrypt --output-type json {{ playbook_dir }}/../secrets/openbao-unseal.sops.yaml
  environment:
    SOPS_AGE_KEY_FILE: /etc/sops/age/keys.txt
  register: openbao_generated_secrets
  changed_when: false
  when: openbao_generated_secrets_file.stat.exists
  no_log: true

- name: Merge generated OpenBao unseal secrets
  ansible.builtin.set_fact:
    openbao: "{{ openbao | default({}) | combine(decrypted_openbao_generated_secrets.openbao | default({}), recursive=True) }}"
    openbao_config: "{{ openbao_config | default({}) | combine(decrypted_openbao_generated_secrets.openbao_config | default({}), recursive=True) }}"
  vars:
    decrypted_openbao_generated_secrets: "{{ openbao_generated_secrets.stdout | from_json }}"
  when:
    - openbao_generated_secrets is defined
    - not (openbao_generated_secrets is skipped)
  no_log: true

- name: Build OpenBao config token fact
  ansible.builtin.set_fact:
    openbao_config_token: "{{ openbao.root_token | default('', true) if (openbao.root_token | default('', true) | length > 0) else (openbao_config.root_token | default('', true)) }}"
    openbao_config_validate_certs: "{{ openbao_config.validate_certs | default(not (ci_mode | default(false))) }}"
  no_log: true

- name: Fail when OpenBao config is enabled without root token
  ansible.builtin.fail:
    msg: "openbao.root_token or openbao_config.root_token is required when openbao_config.enabled=true"
  when: (openbao_config_token | default('') | length) == 0

- name: Build OpenBao OIDC client facts
  ansible.builtin.set_fact:
    openbao_oidc_client_id: "{{ oidc_clients.openbao.client_id | default('openbao', true) if (ci_mode | default(false)) else (oidc_clients.openbao.client_id | default('', true)) }}"
    openbao_oidc_client_secret: "{{ oidc_clients.openbao.client_secret | default('ci-oidc-openbao-client-secret', true) if (ci_mode | default(false)) else (oidc_clients.openbao.client_secret | default('', true)) }}"
    openbao_oidc_discovery_url: "{{ openbao_config.oidc.discovery_url if (openbao_config.oidc.discovery_url | default('', true) | length > 0) else ('https://' ~ service_domains.keycloak ~ '/realms/' ~ (((keycloak_config | default({})).realm | default({})).name | default('homelab'))) }}"
    openbao_oidc_discovery_ca_pem: >-
      {{
        openbao_config.oidc.discovery_ca_pem
        | default(
            lookup(
              'ansible.builtin.file',
              openbao_config.oidc.discovery_ca_file | default('/srv/admin/certs/ca.pem'),
              errors='ignore'
            ),
            true
          )
      }}
  when: openbao_config.oidc.enabled | default(false)
  no_log: true

- name: Build OpenBao OIDC audience facts
  ansible.builtin.set_fact:
    openbao_oidc_bound_audiences: "{{ openbao_config.oidc.role.bound_audiences | default([], true) if (openbao_config.oidc.role.bound_audiences | default([], true) | length > 0) else [openbao_oidc_client_id] }}"
  when: openbao_config.oidc.enabled | default(false)
  no_log: true

- name: Build OpenBao explicit OIDC role facts
  ansible.builtin.set_fact:
    openbao_oidc_roles: "{{ openbao_config.oidc.roles | default([]) }}"
    openbao_oidc_default_role_name: "{{ openbao_config.oidc.role.name | default('default') }}"
    openbao_oidc_default_role_user_claim: "{{ openbao_config.oidc.role.user_claim | default('sub') }}"
    openbao_oidc_default_role_groups_claim: "{{ openbao_config.oidc.role.groups_claim | default('groups') }}"
    openbao_oidc_default_role_allowed_redirect_uris: "{{ openbao_config.oidc.role.allowed_redirect_uris | default([]) }}"
  when: openbao_config.oidc.enabled | default(false)

- name: Validate OpenBao explicit OIDC role names are unique
  ansible.builtin.assert:
    that:
      - openbao_oidc_roles | map(attribute='name') | list | length == openbao_oidc_roles | map(attribute='name') | list | unique | list | length
      - openbao_oidc_default_role_name not in (openbao_oidc_roles | map(attribute='name') | list)
    fail_msg: "openbao_config.oidc.roles names must be unique and must not reuse the default OIDC role name."
  when: openbao_config.oidc.enabled | default(false)

- name: Validate OpenBao explicit OIDC role definitions
  ansible.builtin.assert:
    that:
      - item.name | default('', true) | length > 0
      - item.group | default('', true) | length > 0
      - item.secret_engines | default([]) | length > 0
    fail_msg: "Each openbao_config.oidc.roles entry requires name, group, and at least one secret_engines item."
  loop: "{{ openbao_oidc_roles | default([]) }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  when: openbao_config.oidc.enabled | default(false)

- name: Reset normalized OpenBao explicit OIDC roles
  ansible.builtin.set_fact:
    openbao_oidc_effective_roles: []
  when: openbao_config.oidc.enabled | default(false)

- name: Normalize OpenBao explicit OIDC roles
  ansible.builtin.set_fact:
    openbao_oidc_effective_roles: "{{ openbao_oidc_effective_roles + [item | combine({'policy': 'oidc-' ~ item.name, 'normalized_secret_engines': item.secret_engines | map('regex_replace', '/+$', '') | map('regex_replace', '$', '/') | list})] }}"
  loop: "{{ openbao_oidc_roles | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: openbao_config.oidc.enabled | default(false)

- name: Validate required OpenBao OIDC client settings
  ansible.builtin.assert:
    that:
      - openbao_required_oidc_values[item.key] | length > 0
    fail_msg: "{{ item.path }} is required when ci_mode is false. Define it in the inventory, preferably in secrets.sops.yaml."
  vars:
    openbao_required_oidc_values:
      openbao_client_id: "{{ openbao_oidc_client_id }}"
      openbao_client_secret: "{{ openbao_oidc_client_secret }}"
  loop:
    - { path: "oidc_clients.openbao.client_id", key: "openbao_client_id" }
    - { path: "oidc_clients.openbao.client_secret", key: "openbao_client_secret" }
  loop_control:
    label: "{{ item.path }}"
  when:
    - openbao_config.oidc.enabled | default(false)
    - not (ci_mode | default(false))

- name: Wait for OpenBao API readiness
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/sys/health"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    status_code: [200, 429, 472, 473, 501, 503]
  register: openbao_health
  until: openbao_health.status in [200, 429]
  retries: 30
  delay: 5
  no_log: true

- name: Configure OpenBao backup snapshot policy
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/sys/policies/acl/admin-node-backup"
    method: PUT
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    body_format: json
    body:
      policy: 'path "sys/storage/raft/snapshot" { capabilities = ["read"] }'
    status_code: [200, 204]
  no_log: true

- name: Configure OpenBao restore snapshot policy
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/sys/policies/acl/admin-node-restore"
    method: PUT
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    body_format: json
    body:
      policy: 'path "sys/storage/raft/snapshot" { capabilities = ["update"] } path "sys/storage/raft/snapshot-force" { capabilities = ["update"] }'
    status_code: [200, 204]
  no_log: true

- name: Inspect dedicated OpenBao operation tokens
  ansible.builtin.stat:
    path: "{{ admin_node_root }}/env/openbao-{{ item }}-token"
  loop: [backup, restore]
  register: openbao_operation_token_files
  no_log: true

- name: Create dedicated OpenBao operation tokens
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/auth/token/create-orphan"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    body_format: json
    body:
      policies: ["admin-node-{{ item.item }}"]
      display_name: "admin-node-{{ item.item }}"
      ttl: "8760h"
      renewable: false
    status_code: 200
  loop: "{{ openbao_operation_token_files.results }}"
  when: not item.stat.exists
  register: openbao_operation_tokens_created
  no_log: true

- name: Persist dedicated OpenBao operation tokens
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/env/openbao-{{ item.item.item }}-token"
    content: "{{ ((item.json | default({})).auth | default({})).client_token | default('') }}\n"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ openbao_operation_tokens_created.results | default([]) }}"
  when:
    - not (item.skipped | default(false))
    - ((item.json | default({})).auth | default({})).client_token | default('') | length > 0
  no_log: true

- name: Read enabled OpenBao secret engines
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/sys/mounts"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    status_code: [200, 403]
  register: openbao_secret_engines_response
  until: openbao_secret_engines_response.status == 200
  retries: 30
  delay: 2
  no_log: true

- name: Set OpenBao secret engine map fact
  ansible.builtin.set_fact:
    openbao_secret_engine_map: "{{ openbao_secret_engines_response.json.data | default(openbao_secret_engines_response.json) }}"

- name: Enable configured OpenBao secret engines
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/sys/mounts/{{ item.path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    body_format: json
    body:
      type: "{{ item.type }}"
    status_code: [200, 204]
  loop: "{{ openbao_config.secret_engines | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when: (item.path ~ '/') not in openbao_secret_engine_map
  no_log: true

- name: Read enabled OpenBao secret engines after configuration
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/sys/mounts"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    status_code: [200, 403]
  register: openbao_secret_engines_after_response
  until: openbao_secret_engines_after_response.status == 200
  retries: 30
  delay: 2
  no_log: true

- name: Set final OpenBao secret engine map fact
  ansible.builtin.set_fact:
    openbao_secret_engine_map: "{{ openbao_secret_engines_after_response.json.data | default(openbao_secret_engines_after_response.json) }}"

- name: Reset configured OpenBao KV-v2 secret engine list
  ansible.builtin.set_fact:
    openbao_configured_kv_v2_secret_engines: []
  when: openbao_config.oidc.enabled | default(false)

- name: Build configured OpenBao KV-v2 secret engine list
  ansible.builtin.set_fact:
    openbao_configured_kv_v2_secret_engines: "{{ openbao_configured_kv_v2_secret_engines + [item.path | regex_replace('/+$', '') | regex_replace('$', '/')] }}"
  loop: "{{ openbao_config.secret_engines | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - openbao_config.oidc.enabled | default(false)
    - item.type | default('') == 'kv-v2'

- name: Validate OpenBao explicit OIDC role secret engines
  ansible.builtin.assert:
    that:
      - (item.normalized_secret_engines | difference(openbao_secret_engine_map.keys() | list)) | length == 0
      - (item.normalized_secret_engines | difference(openbao_configured_kv_v2_secret_engines)) | length == 0
    fail_msg: "OpenBao OIDC role {{ item.name }} references unknown or unsupported secret engines: {{ item.normalized_secret_engines | difference(openbao_secret_engine_map.keys() | list) | union(item.normalized_secret_engines | difference(openbao_configured_kv_v2_secret_engines)) | join(', ') }}. Only KV-v2 engines declared in openbao_config.secret_engines are supported."
  loop: "{{ openbao_oidc_effective_roles | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: openbao_config.oidc.enabled | default(false)

- name: Read enabled OpenBao auth methods
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/sys/auth"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    status_code: [200, 403]
  register: openbao_auth_methods_response
  until: openbao_auth_methods_response.status == 200
  retries: 30
  delay: 2
  no_log: true
  when: openbao_config.oidc.enabled | default(false)

- name: Set OpenBao auth method map fact
  ansible.builtin.set_fact:
    openbao_auth_method_map: "{{ openbao_auth_methods_response.json.data | default(openbao_auth_methods_response.json) }}"
  when: openbao_config.oidc.enabled | default(false)

- name: Enable OpenBao OIDC auth method
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/sys/auth/oidc"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    body_format: json
    body:
      type: oidc
    status_code: [200, 204]
  when:
    - openbao_config.oidc.enabled | default(false)
    - "'oidc/' not in openbao_auth_method_map"
  no_log: true

- name: Configure OpenBao OIDC auth backend
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/auth/oidc/config"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    body_format: json
    body: >-
      {{
        {
          'oidc_discovery_url': openbao_oidc_discovery_url,
          'oidc_client_id': openbao_oidc_client_id,
          'oidc_client_secret': openbao_oidc_client_secret,
          'default_role': openbao_config.oidc.default_role | default(openbao_config.oidc.role.name | default('default'))
        }
        | combine(
            {'oidc_discovery_ca_pem': openbao_oidc_discovery_ca_pem}
            if (openbao_oidc_discovery_ca_pem | default('', true) | length > 0)
            else {}
          )
      }}
    status_code: [200, 204]
  when: openbao_config.oidc.enabled | default(false)
  no_log: true

- name: Configure OpenBao OIDC role
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/auth/oidc/role/{{ openbao_oidc_default_role_name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    body_format: json
    body:
      user_claim: "{{ openbao_oidc_default_role_user_claim }}"
      groups_claim: "{{ openbao_oidc_default_role_groups_claim }}"
      allowed_redirect_uris: "{{ openbao_oidc_default_role_allowed_redirect_uris }}"
      bound_audiences: "{{ openbao_oidc_bound_audiences }}"
      policies:
        - "default"
    status_code: [200, 204]
  when: openbao_config.oidc.enabled | default(false)
  no_log: true

- name: Configure OpenBao explicit OIDC role policies
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/sys/policies/acl/{{ item.policy }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    body_format: json
    body:
      policy: "{{ lookup('ansible.builtin.template', 'oidc-kv-v2-policy.hcl.j2') }}"
    status_code: [200, 204]
  loop: "{{ openbao_oidc_effective_roles | default([]) }}"
  loop_control:
    label: "{{ item.policy }}"
  when: openbao_config.oidc.enabled | default(false)
  no_log: true

- name: Configure OpenBao explicit OIDC roles
  ansible.builtin.uri:
    url: "{{ openbao_config_url }}/v1/auth/oidc/role/{{ item.name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_config_token }}"
    validate_certs: "{{ openbao_config_validate_certs }}"
    body_format: json
    body:
      user_claim: "{{ item.user_claim | default(openbao_oidc_default_role_user_claim) }}"
      groups_claim: "{{ item.groups_claim | default(openbao_oidc_default_role_groups_claim) }}"
      allowed_redirect_uris: "{{ item.allowed_redirect_uris | default(openbao_oidc_default_role_allowed_redirect_uris) }}"
      bound_audiences: "{{ item.bound_audiences | default(openbao_oidc_bound_audiences, true) }}"
      bound_claims: "{{ {item.groups_claim | default(openbao_oidc_default_role_groups_claim): item.group} }}"
      policies:
        - "default"
        - "{{ item.policy }}"
    status_code: [200, 204]
  loop: "{{ openbao_oidc_effective_roles | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: openbao_config.oidc.enabled | default(false)
  no_log: true
