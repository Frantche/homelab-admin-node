---
- name: Fail when OpenBao config is enabled without root token
  ansible.builtin.fail:
    msg: "openbao_config.root_token is required when openbao_config.enabled=true"
  when: (openbao_config.root_token | default('') | length) == 0

- name: Read enabled OpenBao secret engines
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - BAO_ADDR=http://127.0.0.1:8200
      - -e
      - "VAULT_TOKEN={{ openbao_config.root_token }}"
      - openbao
      - bao
      - secrets
      - list
      - -format=json
  register: openbao_secret_engines_raw
  changed_when: false
  no_log: true

- name: Set OpenBao secret engine map fact
  ansible.builtin.set_fact:
    openbao_secret_engine_map: "{{ openbao_secret_engines_raw.stdout | from_json }}"

- name: Enable configured OpenBao secret engines
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - BAO_ADDR=http://127.0.0.1:8200
      - -e
      - "VAULT_TOKEN={{ openbao_config.root_token }}"
      - openbao
      - bao
      - secrets
      - enable
      - "-path={{ item.path }}"
      - "{{ item.type }}"
  loop: "{{ openbao_config.secret_engines | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when: (item.path ~ '/') not in openbao_secret_engine_map
  no_log: true

- name: Read enabled OpenBao auth methods
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - BAO_ADDR=http://127.0.0.1:8200
      - -e
      - "VAULT_TOKEN={{ openbao_config.root_token }}"
      - openbao
      - bao
      - auth
      - list
      - -format=json
  register: openbao_auth_methods_raw
  changed_when: false
  no_log: true
  when: openbao_config.oidc.enabled | default(false)

- name: Set OpenBao auth method map fact
  ansible.builtin.set_fact:
    openbao_auth_method_map: "{{ openbao_auth_methods_raw.stdout | from_json }}"
  when: openbao_config.oidc.enabled | default(false)

- name: Enable OpenBao OIDC auth method
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - BAO_ADDR=http://127.0.0.1:8200
      - -e
      - "VAULT_TOKEN={{ openbao_config.root_token }}"
      - openbao
      - bao
      - auth
      - enable
      - oidc
  when:
    - openbao_config.oidc.enabled | default(false)
    - "'oidc/' not in openbao_auth_method_map"
  no_log: true

- name: Configure OpenBao OIDC auth backend
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - BAO_ADDR=http://127.0.0.1:8200
      - -e
      - "VAULT_TOKEN={{ openbao_config.root_token }}"
      - openbao
      - bao
      - write
      - auth/oidc/config
      - "oidc_discovery_url={{ openbao_config.oidc.discovery_url | mandatory('openbao_config.oidc.discovery_url is required') }}"
      - "oidc_client_id={{ openbao_config.oidc.client_id | mandatory('openbao_config.oidc.client_id is required') }}"
      - "oidc_client_secret={{ openbao_config.oidc.client_secret | mandatory('openbao_config.oidc.client_secret is required') }}"
      - "default_role={{ openbao_config.oidc.default_role | default(openbao_config.oidc.role.name | default('default')) }}"
  when: openbao_config.oidc.enabled | default(false)
  no_log: true

- name: Configure OpenBao OIDC role
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - BAO_ADDR=http://127.0.0.1:8200
      - -e
      - "VAULT_TOKEN={{ openbao_config.root_token }}"
      - openbao
      - bao
      - write
      - "auth/oidc/role/{{ openbao_config.oidc.role.name | default('default') }}"
      - "user_claim={{ openbao_config.oidc.role.user_claim | default('sub') }}"
      - "groups_claim={{ openbao_config.oidc.role.groups_claim | default('groups') }}"
      - "allowed_redirect_uris={{ (openbao_config.oidc.role.allowed_redirect_uris | default([])) | join(',') }}"
      - "bound_audiences={{ (openbao_config.oidc.role.bound_audiences | default([])) | join(',') }}"
      - "policies={{ (openbao_config.oidc.role.policies | default(['default'])) | join(',') }}"
  when: openbao_config.oidc.enabled | default(false)
  no_log: true
