---
- name: Inspect managed stack definitions in locked mode
  ansible.builtin.stat:
    path: "{{ admin_node_root }}/stacks/{{ item }}/compose.yaml"
  loop:
    - traefik
    - openbao
    - keycloak
    - harbor
    - gitea
    - observability
    - cloudflared
  register: locked_stack_definitions

- name: Stop every managed stack in locked mode
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - "{{ admin_node_root }}/stacks/{{ item.item }}/compose.yaml"
      - down
      - --remove-orphans
  loop: "{{ locked_stack_definitions.results }}"
  when: item.stat.exists
  register: locked_stop
  changed_when: "'Removed' in (locked_stop.stdout | default(''))"

- name: Stop operational timers in locked mode
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - admin-backup.timer
    - admin-gitea-process-backup.timer
