---
- name: Ensure keycloak stack directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/keycloak"
    state: directory
    mode: "0755"

- name: Copy keycloak stack files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../stacks/keycloak/"
    dest: "{{ admin_node_root }}/stacks/keycloak/"
    mode: preserve

- name: Render keycloak compose
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/keycloak/compose.yaml"
    dest: "{{ admin_node_root }}/stacks/keycloak/compose.yaml"
    mode: "0644"

- name: Render keycloak env
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/env/keycloak.env"
    mode: "0600"
    content: |
      KEYCLOAK_DB_PASSWORD={{ keycloak.db_password | mandatory('keycloak.db_password is required') }}
      KEYCLOAK_ADMIN={{ keycloak.admin_user | default('admin') }}
      KEYCLOAK_ADMIN_PASSWORD={{ keycloak.admin_password | mandatory('keycloak.admin_password is required') }}
  no_log: true

- name: Ensure keycloak database container is running
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/keycloak.env -f compose.yaml up --wait --wait-timeout 300 keycloak-db
  args:
    chdir: "{{ admin_node_root }}/stacks/keycloak"
  changed_when: false

- name: Wait for keycloak database container health
  ansible.builtin.command: docker inspect -f {% raw %}'{{ .State.Health.Status }}'{% endraw %} keycloak-db
  register: keycloak_db_health
  until: keycloak_db_health.stdout | trim == "healthy"
  retries: 60
  delay: 2
  changed_when: false

- name: Wait for keycloak database readiness
  ansible.builtin.command: docker exec keycloak-db pg_isready -U keycloak -d keycloak
  register: keycloak_db_readiness
  until: keycloak_db_readiness.rc == 0
  retries: 30
  delay: 2
  changed_when: false

- name: Align keycloak database password with inventory secret
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec -i -e KEYCLOAK_DB_PASSWORD="{{ keycloak.db_password | mandatory('keycloak.db_password is required') }}" keycloak-db sh -c 'psql -U keycloak -d keycloak -v ON_ERROR_STOP=1 -v pw="$KEYCLOAK_DB_PASSWORD"' <<'SQL'
    ALTER USER keycloak WITH PASSWORD :'pw';
    SQL
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Start keycloak stack
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/keycloak.env -f compose.yaml up --wait --wait-timeout 300
  args:
    chdir: "{{ admin_node_root }}/stacks/keycloak"
  changed_when: true
