---
- name: Ensure keycloak stack directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/keycloak"
    state: directory
    mode: "0755"

- name: Render keycloak compose
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/keycloak/compose.yaml"
    dest: "{{ admin_node_root }}/stacks/keycloak/compose.yaml"
    mode: "0644"

- name: Render keycloak env
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/env/keycloak.env"
    mode: "0600"
    content: |
      KEYCLOAK_DB_PASSWORD={{ keycloak.db_password | mandatory('keycloak.db_password is required') | to_json }}
      KEYCLOAK_ADMIN={{ keycloak.admin_user | default('admin') | to_json }}
      KEYCLOAK_ADMIN_PASSWORD={{ keycloak.admin_password | mandatory('keycloak.admin_password is required') | to_json }}
  no_log: true

- name: Ensure keycloak database container is running
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/keycloak.env -f compose.yaml up --wait --wait-timeout 300 keycloak-db
  args:
    chdir: "{{ admin_node_root }}/stacks/keycloak"
  changed_when: false
  when: admin_mode != 'restore'

- name: Wait for keycloak database container health
  ansible.builtin.command: docker inspect -f {% raw %}'{{ .State.Health.Status }}'{% endraw %} keycloak-db
  register: keycloak_db_health
  until: keycloak_db_health.stdout | trim == "healthy"
  retries: 60
  delay: 2
  changed_when: false
  when: admin_mode != 'restore'

- name: Wait for keycloak database readiness
  ansible.builtin.command: docker exec keycloak-db pg_isready -U keycloak -d keycloak
  register: keycloak_db_readiness
  until: keycloak_db_readiness.rc == 0
  retries: 30
  delay: 2
  changed_when: false
  when: admin_mode != 'restore'

- name: Align keycloak database password with inventory secret
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -i
      - -e
      - KEYCLOAK_DB_PASSWORD
      - keycloak-db
      - sh
      - -c
      - 'exec psql -U keycloak -d keycloak -v ON_ERROR_STOP=1 -v pw="$KEYCLOAK_DB_PASSWORD"'
  args:
    stdin: "ALTER USER keycloak WITH PASSWORD :'pw';"
  environment:
    KEYCLOAK_DB_PASSWORD: "{{ keycloak.db_password | mandatory('keycloak.db_password is required') }}"
  changed_when: false
  no_log: true
  when: admin_mode != 'restore'

- name: Start keycloak stack
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/keycloak.env -f compose.yaml up --wait --wait-timeout 300
  args:
    chdir: "{{ admin_node_root }}/stacks/keycloak"
  register: keycloak_stack_start
  changed_when: >-
    'Created' in keycloak_stack_start.stderr or 'Recreated' in keycloak_stack_start.stderr or
    'Started' in keycloak_stack_start.stderr
  when: admin_mode != 'restore'

- name: Wait for keycloak HTTP readiness
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - keycloak
      - bash
      - -lc
      - |
        exec 3<>/dev/tcp/127.0.0.1/8080
        printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n' >&3
        IFS= read -r status <&3
        case "$status" in
          *" 200 "*) exit 0 ;;
          *) echo "$status"; exit 1 ;;
        esac
  register: keycloak_http_ready
  until: keycloak_http_ready.rc == 0
  retries: 60
  delay: 2
  changed_when: false
  when: admin_mode != 'restore'

- name: Verify Keycloak admin password matches inventory
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - KC_CLI_PASSWORD
      - keycloak
      - /opt/keycloak/bin/kcadm.sh
      - get
      - serverinfo
      - --no-config
      - --server
      - http://127.0.0.1:8080
      - --realm
      - master
      - --user
      - "{{ keycloak.admin_user | default('admin') }}"
      - -r
      - master
  environment:
    KC_CLI_PASSWORD: "{{ keycloak.admin_password | mandatory('keycloak.admin_password is required') }}"
  register: keycloak_admin_inventory_auth
  changed_when: false
  failed_when: false
  no_log: true
  when: admin_mode != 'restore'

- name: Recover Keycloak admin password from inventory
  when:
    - admin_mode != 'restore'
    - keycloak_admin_inventory_auth.rc != 0
    - keycloak.admin_recover_password | default(true)
  no_log: true
  block:
    - name: Generate temporary Keycloak recovery admin username suffix
      ansible.builtin.command: openssl rand -hex 6
      register: keycloak_recovery_admin_suffix
      changed_when: false

    - name: Generate temporary Keycloak recovery admin password
      ansible.builtin.command: openssl rand -hex 24
      register: keycloak_recovery_admin_password_generated
      changed_when: false

    - name: Store temporary Keycloak recovery admin credentials
      ansible.builtin.set_fact:
        keycloak_recovery_admin_user: "admin-recovery-{{ keycloak_recovery_admin_suffix.stdout | trim }}"
        keycloak_recovery_admin_password: "{{ keycloak_recovery_admin_password_generated.stdout | trim }}"

    - name: Remove stale Keycloak recovery admins before bootstrapping
      ansible.builtin.command: docker exec -i keycloak-db psql -U keycloak -d keycloak -v ON_ERROR_STOP=1
      args:
        stdin: |
          CREATE TEMP TABLE recovery_user_ids AS
            SELECT u.id
            FROM user_entity u
            JOIN realm r ON r.id = u.realm_id
            WHERE r.name = 'master'
              AND u.username LIKE 'admin-recovery-%';
          DELETE FROM federated_identity WHERE user_id IN (SELECT id FROM recovery_user_ids);
          DELETE FROM user_attribute WHERE user_id IN (SELECT id FROM recovery_user_ids);
          DELETE FROM user_required_action WHERE user_id IN (SELECT id FROM recovery_user_ids);
          DELETE FROM user_role_mapping WHERE user_id IN (SELECT id FROM recovery_user_ids);
          DELETE FROM user_consent WHERE user_id IN (SELECT id FROM recovery_user_ids);
          DELETE FROM issued_ver_credential WHERE user_id IN (SELECT id FROM recovery_user_ids);
          DELETE FROM credential WHERE user_id IN (SELECT id FROM recovery_user_ids);
          DELETE FROM user_group_membership WHERE user_id IN (SELECT id FROM recovery_user_ids);
          DELETE FROM user_ver_credential WHERE user_id IN (SELECT id FROM recovery_user_ids);
          DELETE FROM user_entity WHERE id IN (SELECT id FROM recovery_user_ids);
      changed_when: true

    - name: Bootstrap temporary Keycloak recovery admin
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -e
          - "KEYCLOAK_RECOVERY_ADMIN={{ keycloak_recovery_admin_user }}"
          - -e
          - "KEYCLOAK_RECOVERY_PASSWORD={{ keycloak_recovery_admin_password }}"
          - keycloak
          - /opt/keycloak/bin/kc.sh
          - bootstrap-admin
          - user
          - --username:env=KEYCLOAK_RECOVERY_ADMIN
          - --password:env=KEYCLOAK_RECOVERY_PASSWORD
          - --no-prompt
      args:
        chdir: "{{ admin_node_root }}/stacks/keycloak"
      changed_when: true

    - name: Wait for temporary Keycloak recovery admin authentication
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -e
          - "KC_CLI_PASSWORD={{ keycloak_recovery_admin_password }}"
          - keycloak
          - /opt/keycloak/bin/kcadm.sh
          - get
          - serverinfo
          - --no-config
          - --server
          - http://127.0.0.1:8080
          - --realm
          - master
          - --user
          - "{{ keycloak_recovery_admin_user }}"
          - --password
          - "{{ keycloak_recovery_admin_password }}"
          - -r
          - master
      register: keycloak_recovery_admin_auth
      until: keycloak_recovery_admin_auth.rc == 0
      retries: 12
      delay: 5
      changed_when: false

    - name: Reset permanent Keycloak admin password through recovery admin
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -e
          - "KC_CLI_PASSWORD={{ keycloak_recovery_admin_password }}"
          - -e
          - "KEYCLOAK_RECOVERY_ADMIN={{ keycloak_recovery_admin_user }}"
          - -e
          - "KEYCLOAK_TARGET_ADMIN={{ keycloak.admin_user | default('admin') }}"
          - -e
          - "KEYCLOAK_TARGET_PASSWORD={{ keycloak.admin_password | mandatory('keycloak.admin_password is required') }}"
          - keycloak
          - bash
          - -lc
          - |
            set -euo pipefail
            kcadm_auth=(\
              --no-config \
              --server http://127.0.0.1:8080 \
              --realm master \
              --user "$KEYCLOAK_RECOVERY_ADMIN" \
              --password "$KC_CLI_PASSWORD")
            target_admin_id="$(
              /opt/keycloak/bin/kcadm.sh get users \
                "${kcadm_auth[@]}" \
                -r master \
                -q username="$KEYCLOAK_TARGET_ADMIN" \
                --fields id \
                --format csv \
                --noquotes \
              | sed -n '/^[0-9a-fA-F-]\{36\}$/p' \
              | head -n 1
            )"
            if [ -z "$target_admin_id" ]; then
              /opt/keycloak/bin/kcadm.sh create users \
                "${kcadm_auth[@]}" \
                -r master \
                -s username="$KEYCLOAK_TARGET_ADMIN" \
                -s enabled=true
              target_admin_id="$(
                /opt/keycloak/bin/kcadm.sh get users \
                  "${kcadm_auth[@]}" \
                  -r master \
                  -q username="$KEYCLOAK_TARGET_ADMIN" \
                  --fields id \
                  --format csv \
                  --noquotes \
                | sed -n '/^[0-9a-fA-F-]\{36\}$/p' \
                | head -n 1
              )"
              if [ -z "$target_admin_id" ]; then
                echo "Keycloak admin user '$KEYCLOAK_TARGET_ADMIN' could not be created in realm master" >&2
                exit 1
              fi
              /opt/keycloak/bin/kcadm.sh add-roles \
                "${kcadm_auth[@]}" \
                -r master \
                --uid "$target_admin_id" \
                --rolename admin
            fi
            /opt/keycloak/bin/kcadm.sh set-password \
              "${kcadm_auth[@]}" \
              -r master \
              --userid "$target_admin_id" \
              --new-password "$KEYCLOAK_TARGET_PASSWORD"
            /opt/keycloak/bin/kcadm.sh get users \
              "${kcadm_auth[@]}" \
              -r master \
              -q search=admin-recovery- \
              --fields id,username \
              --format csv \
              --noquotes \
            | while IFS= read -r recovery_line; do
                recovery_id="${recovery_line%%,*}"
                recovery_username="${recovery_line#*,}"
                case "$recovery_id:$recovery_username" in
                  ????????-????-????-????-????????????:admin-recovery-*) /opt/keycloak/bin/kcadm.sh delete "users/$recovery_id" "${kcadm_auth[@]}" -r master ;;
                esac
              done
      changed_when: true

- name: Fail when Keycloak admin password differs from inventory and recovery is disabled
  ansible.builtin.fail:
    msg: "Keycloak admin password does not match keycloak.admin_password and keycloak.admin_recover_password is disabled."
  when:
    - admin_mode != 'restore'
    - keycloak_admin_inventory_auth.rc != 0
    - not (keycloak.admin_recover_password | default(true))
  no_log: true
