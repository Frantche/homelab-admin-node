---
- name: Build effective restic repository list
  ansible.builtin.set_fact:
    backup_restic_repositories_effective: >-
      {{
        backup.restic_repositories | default(
          (
            [{
              'name': 'default',
              'repository': backup.restic_repository,
              'password': backup.restic_password | default(''),
              'forget_args': backup.restic_forget_args | default('--keep-last 3 --prune')
            }]
            if (backup.restic_repository | default('', true) | length > 0)
            else []
          ),
          true
        )
      }}
  no_log: true

- name: Render backup environment
  ansible.builtin.template:
    src: backup-env.j2
    dest: /srv/admin/env/backup.env
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Validate Gitea process backup configuration
  ansible.builtin.assert:
    that:
      - backup.gitea_process.method | default('') in ['s3', 'ftp']
      - >
        (backup.gitea_process.method | default('')) != 's3'
        or (
          backup.gitea_process.endpoint_url | default('') | length > 0
          and backup.gitea_process.bucket | default('') | length > 0
          and backup.gitea_process.aws_access_key_id | default('') | length > 0
          and backup.gitea_process.aws_secret_access_key | default('') | length > 0
        )
      - >
        (backup.gitea_process.method | default('')) != 'ftp'
        or (
          backup.gitea_process.ftp_host | default('') | length > 0
          and backup.gitea_process.ftp_user | default('') | length > 0
          and backup.gitea_process.ftp_password | default('') | length > 0
        )
    fail_msg: "backup.gitea_process is enabled but its backend configuration is incomplete."
  when: backup.gitea_process.enabled | default(false) | bool
  no_log: true

- name: Render Gitea process backup environment
  ansible.builtin.template:
    src: gitea-process-backup-env.j2
    dest: /srv/admin/env/gitea-process-backup.env
    owner: root
    group: root
    mode: "0600"
  when: backup.gitea_process.enabled | default(false) | bool
  no_log: true

- name: Ensure Gitea process backup scratch directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  loop:
    - "{{ backup.gitea_process.tmp_folder | default('/srv/admin/backups/gitea-process/tmp') }}"
    - "{{ backup.gitea_process.restore_tmp_folder | default('/srv/admin/backups/gitea-process/restore-tmp') }}"
  when: backup.gitea_process.enabled | default(false) | bool

- name: Trigger backup
  ansible.builtin.command: /opt/homelab-admin-node/bin/admin-node backup run
  environment:
    OPENBAO_TOKEN: "{{ openbao.root_token | default('') }}"
    ADMIN_NODE_LAN_IP: "{{ admin_node_lan_ip }}"
    HARBOR_DOMAIN: "{{ service_domains.harbor }}"
    OPENBAO_DOMAIN: "{{ service_domains.openbao }}"
    KEYCLOAK_DOMAIN: "{{ service_domains.keycloak }}"
    GITEA_DOMAIN: "{{ service_domains.gitea }}"
    TRAEFIK_DOMAIN: "{{ service_domains.traefik }}"
    CI_MOCK_PIHOLE: "{{ 'true' if ((ci_mode | default(false)) or (ci.mock_pihole | default(false))) else 'false' }}"
    CI_MOCK_CLOUDFLARE_TUNNEL: "{{ 'true' if ((ci_mode | default(false)) or (ci.mock_cloudflare_tunnel | default(false))) else 'false' }}"
    SKIP_PUBLIC_URL_VALIDATION: "{{ 'true' if ((ci_mode | default(false)) or (ci.skip_public_url_validation | default(false))) else 'false' }}"
    PIHOLE_ENABLED: "{{ 'true' if ((pihole.enabled | default(true)) | bool) else 'false' }}"
    CLOUDFLARE_ENABLED: "{{ 'true' if ((cloudflare.enabled | default(true)) | bool) else 'false' }}"
  changed_when: false
