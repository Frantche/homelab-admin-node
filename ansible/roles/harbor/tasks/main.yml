---
- name: Ensure harbor stack directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/harbor"
    state: directory
    mode: "0755"

- name: Copy harbor stack files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../stacks/harbor/"
    dest: "{{ admin_node_root }}/stacks/harbor/"
    mode: preserve

- name: Ensure harbor secret key directory
  ansible.builtin.file:
    path: /srv/admin/data/harbor/secret
    state: directory
    mode: "0700"

- name: Generate harbor secret key (used for encrypting credentials)
  ansible.builtin.copy:
    dest: /srv/admin/data/harbor/secret/key
    content: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_lowercase,digits length=16') }}"
    mode: "0600"
    force: false

- name: Render harbor env
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/env/harbor.env"
    mode: "0600"
    content: |
      HARBOR_ADMIN_PASSWORD={{ harbor.admin_password | mandatory('harbor.admin_password is required') }}
      HARBOR_DB_PASSWORD={{ harbor.db_password | default('harbor-ci-db') }}
      HARBOR_CORE_SECRET={{ harbor.core_secret | default('harbor-ci-core-secret') }}
      HARBOR_JOBSERVICE_SECRET={{ harbor.jobservice_secret | default('harbor-ci-job-secret') }}
      HARBOR_REGISTRY_PASSWORD={{ harbor.registry_password | default('harbor-ci-registry') }}
  no_log: true

- name: Start harbor stack
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/harbor.env -f compose.yaml up -d
  args:
    chdir: "{{ admin_node_root }}/stacks/harbor"
  changed_when: true
