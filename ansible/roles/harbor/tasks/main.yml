---
- name: Build Harbor runtime secret facts
  ansible.builtin.set_fact:
    harbor_runtime:
      admin_password: "{{ harbor.admin_password | default('ci-Harbor-admin-p4ss', true) if (ci_mode | default(false)) else (harbor.admin_password | default('', true)) }}"
      db_password: "{{ harbor.db_password | default('ci-harbor-db-pass', true) if (ci_mode | default(false)) else (harbor.db_password | default('', true)) }}"
      core_secret: "{{ harbor.core_secret | default('ci-harbor-core-secret', true) if (ci_mode | default(false)) else (harbor.core_secret | default('', true)) }}"
      jobservice_secret: "{{ harbor.jobservice_secret | default('ci-harbor-job-secret', true) if (ci_mode | default(false)) else (harbor.jobservice_secret | default('', true)) }}"
      registry_password: "{{ harbor.registry_password | default('ci-harbor-registry', true) if (ci_mode | default(false)) else (harbor.registry_password | default('', true)) }}"
  no_log: true

- name: Require Harbor secrets outside CI
  ansible.builtin.assert:
    that:
      - harbor_runtime[item.key] | length > 0
    fail_msg: "{{ item.path }} is required when ci_mode is false. Define it in the inventory, preferably in secrets.sops.yaml."
  loop:
    - { key: "admin_password", path: "harbor.admin_password" }
    - { key: "db_password", path: "harbor.db_password" }
    - { key: "core_secret", path: "harbor.core_secret" }
    - { key: "jobservice_secret", path: "harbor.jobservice_secret" }
    - { key: "registry_password", path: "harbor.registry_password" }
  loop_control:
    label: "{{ item.path }}"
  when: not (ci_mode | default(false))

- name: Ensure harbor stack directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/harbor"
    state: directory
    mode: "0755"
  when: not (harbor_test_mode | default(false))

- name: Ensure harbor config directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/harbor/config"
    state: directory
    mode: "0755"
  when: not (harbor_test_mode | default(false))

- name: Ensure Harbor core data directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/data/harbor/core"
    state: directory
    mode: "0755"
  when: not (harbor_test_mode | default(false))

- name: Ensure Harbor runtime data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ admin_node_root }}/data/harbor/log"
    - "{{ admin_node_root }}/data/harbor/registry"
    - "{{ admin_node_root }}/data/harbor/redis"
    - "{{ admin_node_root }}/data/harbor/trivy-adapter/trivy"
    - "{{ admin_node_root }}/data/harbor/trivy-adapter/reports"
  when: not (harbor_test_mode | default(false))

- name: Ensure Harbor registry data directory permissions
  ansible.builtin.file:
    path: "{{ admin_node_root }}/data/harbor/registry"
    state: directory
    owner: "10000"
    group: "10000"
    mode: "0755"
    recurse: true
  when: not (harbor_test_mode | default(false))

- name: Ensure Harbor Redis data directory permissions
  ansible.builtin.file:
    path: "{{ admin_node_root }}/data/harbor/redis"
    state: directory
    owner: "999"
    group: "999"
    mode: "0755"
  when: not (harbor_test_mode | default(false))

- name: Ensure Harbor Trivy adapter data directory permissions
  ansible.builtin.file:
    path: "{{ admin_node_root }}/data/harbor/trivy-adapter"
    state: directory
    owner: "10000"
    group: "10000"
    mode: "0755"
    recurse: true
  when: not (harbor_test_mode | default(false))

- name: Generate Harbor core secret key
  ansible.builtin.shell:
    cmd: "openssl rand -hex 16 | tr -d '\n' > {{ admin_node_root }}/data/harbor/core/secretkey"
    creates: "{{ admin_node_root }}/data/harbor/core/secretkey"
  when: not (harbor_test_mode | default(false))
  no_log: true

- name: Generate Harbor token signing key
  ansible.builtin.command:
    argv:
      - openssl
      - genrsa
      - -traditional
      - -out
      - "{{ admin_node_root }}/data/harbor/core/token.key"
      - "4096"
    creates: "{{ admin_node_root }}/data/harbor/core/token.key"
  when: not (harbor_test_mode | default(false))
  no_log: true

- name: Generate Harbor token signing certificate
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -new
      - -x509
      - -days
      - "3650"
      - -key
      - "{{ admin_node_root }}/data/harbor/core/token.key"
      - -out
      - "{{ admin_node_root }}/data/harbor/core/token.crt"
      - -subj
      - /CN=harbor-token-issuer
    creates: "{{ admin_node_root }}/data/harbor/core/token.crt"
  when: not (harbor_test_mode | default(false))
  no_log: true

- name: Set Harbor token material permissions
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0644"
  loop:
    - "{{ admin_node_root }}/data/harbor/core/token.key"
    - "{{ admin_node_root }}/data/harbor/core/token.crt"
    - "{{ admin_node_root }}/data/harbor/core/secretkey"
  when: not (harbor_test_mode | default(false))
  no_log: true

- name: Verify Harbor registry password file
  ansible.builtin.shell: |
    set -euo pipefail
    test -f "{{ admin_node_root }}/data/harbor/core/registry.passwd"
    printf '%s\n' "$HARBOR_REGISTRY_PASSWORD" | docker run --rm -i \
      -v "{{ admin_node_root }}/data/harbor/core/registry.passwd:/registry.passwd:ro" \
      --entrypoint /usr/bin/htpasswd \
      goharbor/prepare:v2.15.2@sha256:5b9428fb649b3a0e0fe497189a880d7c9f1281538b85de9ad377cb524e427bd5 \
      -vi /registry.passwd harbor_registry_user
  args:
    executable: /bin/bash
  environment:
    HARBOR_REGISTRY_PASSWORD: "{{ harbor_runtime.registry_password }}"
  register: harbor_registry_password_check
  changed_when: false
  failed_when: false
  when: not (harbor_test_mode | default(false))
  no_log: true

- name: Generate Harbor registry password file
  ansible.builtin.shell: |
    set -euo pipefail
    password_file="{{ admin_node_root }}/data/harbor/core/registry.passwd"
    temporary_file="${password_file}.tmp"
    trap 'rm -f "$temporary_file"' EXIT
    umask 077
    printf '%s\n' "$HARBOR_REGISTRY_PASSWORD" | docker run --rm -i \
      --entrypoint /usr/bin/htpasswd \
      goharbor/prepare:v2.15.2@sha256:5b9428fb649b3a0e0fe497189a880d7c9f1281538b85de9ad377cb524e427bd5 \
      -niB harbor_registry_user > "$temporary_file"
    install -o root -g 10000 -m 0640 "$temporary_file" "$password_file"
  args:
    executable: /bin/bash
  environment:
    HARBOR_REGISTRY_PASSWORD: "{{ harbor_runtime.registry_password }}"
  register: harbor_registry_password_render
  when:
    - not (harbor_test_mode | default(false))
    - harbor_registry_password_check.rc != 0
  no_log: true

- name: Copy Harbor static config files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../stacks/harbor/config/{{ item }}"
    dest: "{{ admin_node_root }}/stacks/harbor/config/{{ item }}"
    mode: "0644"
  register: harbor_stack_files_copy
  loop:
    - core-app.conf
    - harbor-nginx.conf
    - jobservice.yml
    - logrotate.conf
    - portal-nginx.conf
    - registryctl.yml
  when: not (harbor_test_mode | default(false))

- name: Ensure Harbor config files are readable by containers
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/harbor/config/{{ item }}"
    mode: "0644"
  loop:
    - core-app.conf
    - harbor-nginx.conf
    - jobservice.yml
    - logrotate.conf
    - portal-nginx.conf
    - registryctl.yml
  when: not (harbor_test_mode | default(false))

- name: Render Harbor registry config
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/harbor/config/registry.yml"
    dest: "{{ admin_node_root }}/stacks/harbor/config/registry.yml"
    mode: "0644"
  register: harbor_registry_config_render
  when: not (harbor_test_mode | default(false))

- name: Render harbor compose
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/harbor/compose.yaml"
    dest: "{{ admin_node_root }}/stacks/harbor/compose.yaml"
    mode: "0644"
  register: harbor_compose_render
  when: not (harbor_test_mode | default(false))

- name: Render harbor env
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/env/harbor.env"
    mode: "0600"
    content: |
      HARBOR_ADMIN_PASSWORD={{ harbor_runtime.admin_password }}
      HARBOR_DB_PASSWORD={{ harbor_runtime.db_password }}
      HARBOR_CORE_SECRET={{ harbor_runtime.core_secret }}
      HARBOR_JOBSERVICE_SECRET={{ harbor_runtime.jobservice_secret }}
      HARBOR_REGISTRY_PASSWORD={{ harbor_runtime.registry_password }}
  register: harbor_env_render
  when: not (harbor_test_mode | default(false))
  no_log: true

- name: Ensure Harbor host logging endpoint is running
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/harbor.env -f compose.yaml up -d --wait --wait-timeout 60 harbor-log
  args:
    chdir: "{{ admin_node_root }}/stacks/harbor"
  changed_when: false
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'

- name: Wait for Harbor host logging endpoint
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 1514
    timeout: 60
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'

- name: Ensure Harbor database container is running
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/harbor.env -f compose.yaml up --wait --wait-timeout 300 harbor-db
  args:
    chdir: "{{ admin_node_root }}/stacks/harbor"
  changed_when: false
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'

- name: Wait for Harbor database readiness
  ansible.builtin.command: docker exec harbor-db pg_isready -U postgres -d registry
  register: harbor_db_readiness
  until: harbor_db_readiness.rc == 0
  retries: 30
  delay: 2
  changed_when: false
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'

- name: Align Harbor database password with inventory secret
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -i
      - -e
      - HARBOR_DB_PASSWORD
      - harbor-db
      - sh
      - -c
      - 'exec psql -U postgres -d registry -v ON_ERROR_STOP=1 -v pw="$HARBOR_DB_PASSWORD"'
  args:
    stdin: "ALTER USER postgres WITH PASSWORD :'pw';"
  environment:
    HARBOR_DB_PASSWORD: "{{ harbor_runtime.db_password }}"
  changed_when: false
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'
  no_log: true

- name: Start harbor stack
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/harbor.env -f compose.yaml up --wait --wait-timeout 300
  args:
    chdir: "{{ admin_node_root }}/stacks/harbor"
  register: harbor_stack_start
  changed_when: "'Started' in harbor_stack_start.stderr or 'Started' in harbor_stack_start.stdout or 'Created' in harbor_stack_start.stderr or 'Created' in harbor_stack_start.stdout or 'Recreated' in harbor_stack_start.stderr or 'Recreated' in harbor_stack_start.stdout"
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'

- name: Require previous Harbor admin password for rotation
  ansible.builtin.assert:
    that:
      - harbor.previous_admin_password | default('', true) | length > 0
      - harbor.previous_admin_password != harbor_runtime.admin_password
    fail_msg: "harbor.previous_admin_password must contain the current password when harbor.rotate_admin_password=true."
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'
    - harbor.rotate_admin_password | default(false) | bool
  no_log: true

- name: Read current Harbor administrator
  ansible.builtin.uri:
    url: "https://{{ service_domains.harbor }}/api/v2.0/users/current"
    method: GET
    user: "{{ harbor.admin_user | default('admin') }}"
    password: "{{ harbor.previous_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ not (ci_mode | default(false)) }}"
    status_code: 200
  register: harbor_current_admin
  until: harbor_current_admin.status == 200
  retries: 30
  delay: 5
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'
    - harbor.rotate_admin_password | default(false) | bool
  no_log: true

- name: Rotate Harbor administrator password
  ansible.builtin.uri:
    url: "https://{{ service_domains.harbor }}/api/v2.0/users/{{ harbor_current_admin.json.user_id }}/password"
    method: PUT
    user: "{{ harbor.admin_user | default('admin') }}"
    password: "{{ harbor.previous_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ not (ci_mode | default(false)) }}"
    body_format: json
    body:
      old_password: "{{ harbor.previous_admin_password }}"
      new_password: "{{ harbor_runtime.admin_password }}"
    status_code: 200
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'
    - harbor.rotate_admin_password | default(false) | bool
  no_log: true

- name: Recreate Harbor registry services after authentication config change
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/harbor.env -f compose.yaml up --wait --wait-timeout 300 --force-recreate harbor-registry harbor-registryctl
  args:
    chdir: "{{ admin_node_root }}/stacks/harbor"
  changed_when: true
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'
    - harbor_registry_config_render.changed or (harbor_registry_password_render.changed | default(false))

- name: Reload Harbor nginx upstream resolution
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/harbor.env -f compose.yaml restart harbor-nginx
  args:
    chdir: "{{ admin_node_root }}/stacks/harbor"
  changed_when: true
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'
    - harbor_stack_files_copy.changed or harbor_compose_render.changed or (harbor_env_render.changed | default(false))

- name: Wait for Harbor nginx health after reload
  ansible.builtin.command: docker inspect -f {% raw %}'{{ .State.Health.Status }}'{% endraw %} harbor-nginx
  register: harbor_nginx_health
  changed_when: false
  until: harbor_nginx_health.stdout | trim == "healthy"
  retries: 30
  delay: 2
  when:
    - not (harbor_test_mode | default(false))
    - admin_mode != 'restore'
    - harbor_stack_files_copy.changed or harbor_compose_render.changed or (harbor_env_render.changed | default(false))
