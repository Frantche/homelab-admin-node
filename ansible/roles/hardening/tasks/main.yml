---
- name: Ensure SSH drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy SSH hardening drop-in
  ansible.builtin.template:
    src: sshd-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/10-admin-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: sshd -t -f %s
  notify: Restart sshd

- name: Deploy sudoers policy
  ansible.builtin.template:
    src: sudoers-admin-node.j2
    dest: /etc/sudoers.d/admin-node
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s

- name: Ensure persistent journal directory exists
  ansible.builtin.file:
    path: /var/log/journal
    state: directory
    owner: root
    group: systemd-journal
    mode: "2755"

- name: Ensure journald drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure persistent journald storage
  ansible.builtin.copy:
    src: journald-hardening.conf
    dest: /etc/systemd/journald.conf.d/10-admin-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-journald

- name: Deploy sysctl hardening
  ansible.builtin.copy:
    src: sysctl-hardening.conf
    dest: /etc/sysctl.d/90-admin-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Ensure limits drop-in directory exists
  ansible.builtin.file:
    path: /etc/security/limits.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Disable core dumps via limits.d
  ansible.builtin.copy:
    src: limits-core-dumps.conf
    dest: /etc/security/limits.d/90-admin-core-dumps.conf
    owner: root
    group: root
    mode: "0644"

- name: Harden login defaults
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: "^#?\\s*{{ item.key }}\\s+"
    line: "{{ item.key }}\t{{ item.value }}"
    create: false
    owner: root
    group: root
    mode: "0644"
  loop:
    - key: UMASK
      value: "027"
    - key: PASS_MIN_DAYS
      value: "1"
    - key: PASS_MAX_DAYS
      value: "365"
    - key: SHA_CRYPT_MIN_ROUNDS
      value: "5000"
    - key: SHA_CRYPT_MAX_ROUNDS
      value: "500000"

- name: Ensure modprobe drop-in directory exists
  ansible.builtin.file:
    path: /etc/modprobe.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Disable unused storage and network protocol modules
  ansible.builtin.copy:
    src: modprobe-hardening.conf
    dest: /etc/modprobe.d/90-admin-hardening.conf
    owner: root
    group: root
    mode: "0644"

- name: Configure local hostname resolution
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED ADMIN NODE HOSTNAME"
    block: "{{ admin_node_lan_ip }} {{ (([admin_node_fqdn] if ((admin_node_fqdn | default('')) | length > 0) else []) + [ansible_facts['hostname']]) | join(' ') }}"
    create: true
    owner: root
    group: root
    mode: "0644"

- name: Deploy local login banner
  ansible.builtin.copy:
    src: issue
    dest: /etc/issue
    owner: root
    group: root
    mode: "0644"

- name: Deploy remote login banner
  ansible.builtin.copy:
    src: issue.net
    dest: /etc/issue.net
    owner: root
    group: root
    mode: "0644"

- name: Configure AppArmor confinement
  when: hardening.apparmor.enabled | default(true) | bool
  block:
    - name: Compute AppArmor runtime management mode
      ansible.builtin.set_fact:
        hardening_apparmor_manage_runtime: "{{ (not (ci_mode | default(false) | bool)) or (admin_apparmor_ci_manage_runtime | default(false) | bool) }}"

    - name: Ensure GRUB drop-in directory exists for AppArmor
      ansible.builtin.file:
        path: /etc/default/grub.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: hardening_apparmor_manage_runtime | bool

    - name: Configure GRUB kernel parameters for AppArmor
      ansible.builtin.copy:
        dest: /etc/default/grub.d/90-admin-apparmor.cfg
        owner: root
        group: root
        mode: "0644"
        content: |
          GRUB_CMDLINE_LINUX="$GRUB_CMDLINE_LINUX apparmor=1 security=apparmor lsm=landlock,lockdown,yama,integrity,apparmor,bpf"
      notify: Regenerate GRUB config
      when: hardening_apparmor_manage_runtime | bool

    - name: Check AppArmor reboot marker
      ansible.builtin.stat:
        path: /etc/admin-node/apparmor-reboot-requested
      register: hardening_apparmor_reboot_marker
      when: hardening_apparmor_manage_runtime | bool

    - name: Check AppArmor kernel module
      ansible.builtin.stat:
        path: /sys/module/apparmor/parameters/enabled
      register: hardening_apparmor_kernel
      when: hardening_apparmor_manage_runtime | bool

    - name: Read AppArmor kernel state
      ansible.builtin.slurp:
        path: /sys/module/apparmor/parameters/enabled
      register: hardening_apparmor_kernel_state
      when:
        - hardening_apparmor_manage_runtime | bool
        - hardening_apparmor_kernel.stat.exists

    - name: Mark AppArmor runtime state
      ansible.builtin.set_fact:
        hardening_apparmor_runtime_active: >-
          {{
            (hardening_apparmor_manage_runtime | bool) and
            (hardening_apparmor_kernel.stat.exists | default(false)) and
            ((hardening_apparmor_kernel_state.content | default('') | b64decode | trim) == 'Y')
          }}
        admin_apparmor_runtime_active: >-
          {{
            (hardening_apparmor_manage_runtime | bool) and
            (hardening_apparmor_kernel.stat.exists | default(false)) and
            ((hardening_apparmor_kernel_state.content | default('') | b64decode | trim) == 'Y')
          }}

    - name: Explain pending AppArmor reboot
      ansible.builtin.debug:
        msg: >-
          AppArmor boot parameters have been configured. Reboot the VM, then rerun
          admin-converge to load and enforce the admin-node AppArmor profiles.
      when:
        - hardening_apparmor_manage_runtime | bool
        - not (hardening_apparmor_runtime_active | bool)

    - name: Flush GRUB config before AppArmor reboot
      ansible.builtin.meta: flush_handlers
      when:
        - hardening_apparmor_manage_runtime | bool
        - not (hardening_apparmor_runtime_active | bool)
        - hardening.apparmor.auto_reboot | default(true) | bool
        - not (hardening_apparmor_reboot_marker.stat.exists | default(false))

    - name: Regenerate GRUB config before AppArmor reboot
      ansible.builtin.command:
        argv:
          - grub-mkconfig
          - -o
          - /boot/grub/grub.cfg
      changed_when: true
      when:
        - hardening_apparmor_manage_runtime | bool
        - not (hardening_apparmor_runtime_active | bool)
        - hardening.apparmor.auto_reboot | default(true) | bool
        - not (hardening_apparmor_reboot_marker.stat.exists | default(false))

    - name: Record AppArmor reboot request
      ansible.builtin.file:
        path: /etc/admin-node/apparmor-reboot-requested
        state: touch
        owner: root
        group: root
        mode: "0644"
      when:
        - hardening_apparmor_manage_runtime | bool
        - not (hardening_apparmor_runtime_active | bool)
        - hardening.apparmor.auto_reboot | default(true) | bool
        - not (hardening_apparmor_reboot_marker.stat.exists | default(false))

    - name: Schedule reboot for AppArmor activation
      ansible.builtin.command:
        argv:
          - shutdown
          - -r
          - "+1"
          - "admin-node AppArmor activation"
      changed_when: true
      when:
        - hardening_apparmor_manage_runtime | bool
        - not (hardening_apparmor_runtime_active | bool)
        - hardening.apparmor.auto_reboot | default(true) | bool
        - not (admin_apparmor_ci_defer_reboot | default(false) | bool)
        - not (hardening_apparmor_reboot_marker.stat.exists | default(false))

    - name: Stop convergence after scheduling AppArmor reboot
      ansible.builtin.meta: end_host
      when:
        - hardening_apparmor_manage_runtime | bool
        - not (hardening_apparmor_runtime_active | bool)
        - hardening.apparmor.auto_reboot | default(true) | bool
        - not (hardening_apparmor_reboot_marker.stat.exists | default(false))

    - name: Fail when AppArmor is still inactive after requested reboot
      ansible.builtin.fail:
        msg: >-
          AppArmor is still inactive after a previous automatic reboot request.
          Check the bootloader configuration, the generated GRUB config, and
          /proc/cmdline before rerunning admin-converge.
      when:
        - hardening_apparmor_manage_runtime | bool
        - not (hardening_apparmor_runtime_active | bool)
        - hardening.apparmor.auto_reboot | default(true) | bool
        - hardening_apparmor_reboot_marker.stat.exists | default(false)

    - name: Remove AppArmor reboot marker after successful activation
      ansible.builtin.file:
        path: /etc/admin-node/apparmor-reboot-requested
        state: absent
      when:
        - hardening_apparmor_manage_runtime | bool
        - hardening_apparmor_runtime_active | bool

    - name: Ensure AppArmor profile directory exists
      ansible.builtin.file:
        path: /etc/apparmor.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Compute AppArmor profiles
      ansible.builtin.set_fact:
        hardening_apparmor_profiles:
          - file: admin-node-traefik
            enabled: "{{ (hardening.apparmor.profiles | default({})).traefik | default(true) }}"
          - file: admin-node-cloudflared
            enabled: "{{ (hardening.apparmor.profiles | default({})).cloudflared | default(true) }}"
          - file: admin-node-openbao
            enabled: "{{ (hardening.apparmor.profiles | default({})).openbao | default(true) }}"

    - name: Remove disabled admin-node AppArmor profiles
      ansible.builtin.file:
        path: "/etc/apparmor.d/{{ item.file }}"
        state: absent
      loop: "{{ hardening_apparmor_profiles }}"
      when: not (item.enabled | bool)
      notify: Reload AppArmor profiles

    - name: Deploy admin-node AppArmor profiles
      ansible.builtin.copy:
        src: "apparmor/{{ item.file }}"
        dest: "/etc/apparmor.d/{{ item.file }}"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ hardening_apparmor_profiles }}"
      when: item.enabled | bool
      notify: Reload AppArmor profiles

    - name: Enable and start AppArmor
      ansible.builtin.systemd:
        name: apparmor
        enabled: true
        state: started
      when:
        - hardening_apparmor_manage_runtime | bool
        - hardening_apparmor_runtime_active | bool

    - name: Flush AppArmor profile reload before containers start
      ansible.builtin.meta: flush_handlers
      when:
        - hardening_apparmor_manage_runtime | bool
        - hardening_apparmor_runtime_active | bool

    - name: Load admin-node AppArmor profiles
      ansible.builtin.command:
        argv:
          - apparmor_parser
          - -r
          - "/etc/apparmor.d/{{ item.file }}"
      loop: "{{ hardening_apparmor_profiles }}"
      when:
        - hardening_apparmor_manage_runtime | bool
        - hardening_apparmor_runtime_active | bool
        - item.enabled | bool
      changed_when: false

    - name: Enforce admin-node AppArmor profiles
      ansible.builtin.command:
        argv:
          - aa-enforce
          - "/etc/apparmor.d/{{ item.file }}"
      loop: "{{ hardening_apparmor_profiles }}"
      when:
        - hardening_apparmor_manage_runtime | bool
        - hardening_apparmor_runtime_active | bool
        - hardening.apparmor.enforce | default(true) | bool
        - item.enabled | bool
      changed_when: false

- name: Ensure audited admin directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: /etc/admin-node
      mode: "0755"
    - path: /etc/sops/age
      mode: "0700"
    - path: "{{ admin_node_root }}/env"
      mode: "0700"

- name: Ensure audit rules directory exists
  ansible.builtin.file:
    path: /etc/audit/rules.d
    state: directory
    owner: root
    group: root
    mode: "0750"
  when: hardening.auditd.enabled | default(true)

- name: Deploy auditd hardening rules
  ansible.builtin.copy:
    src: audit-admin-node.rules
    dest: /etc/audit/rules.d/90-admin-node.rules
    owner: root
    group: root
    mode: "0640"
  notify: Load audit rules
  when: hardening.auditd.enabled | default(true)

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started
  when: hardening.auditd.enabled | default(true)

- name: Ensure fail2ban jail directory exists
  ansible.builtin.file:
    path: /etc/fail2ban/jail.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: hardening.fail2ban.enabled | default(true)

- name: Configure fail2ban sshd jail
  ansible.builtin.copy:
    src: fail2ban-sshd.local
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban
  when: hardening.fail2ban.enabled | default(true)

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when: hardening.fail2ban.enabled | default(true)

- name: Check age key file
  ansible.builtin.stat:
    path: /etc/sops/age/keys.txt
  register: hardening_age_key
  no_log: true

- name: Enforce age key permissions
  ansible.builtin.file:
    path: /etc/sops/age/keys.txt
    owner: root
    group: root
    mode: "0400"
  when: hardening_age_key.stat.exists
  no_log: true

- name: Check admin env directory
  ansible.builtin.stat:
    path: "{{ admin_node_root }}/env"
  register: hardening_env_dir

- name: Enforce admin env directory permissions
  ansible.builtin.file:
    path: "{{ admin_node_root }}/env"
    owner: root
    group: root
    mode: "0700"
  when: hardening_env_dir.stat.exists

- name: Find admin env files
  ansible.builtin.find:
    paths: "{{ admin_node_root }}/env"
    file_type: file
    patterns: "*.env"
  register: hardening_env_files
  when: hardening_env_dir.stat.exists
  no_log: true

- name: Enforce admin env file permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ hardening_env_files.files | default([]) }}"
  when: hardening_env_dir.stat.exists
  no_log: true
