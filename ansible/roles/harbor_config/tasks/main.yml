---
- name: Build Harbor API TLS validation fact
  ansible.builtin.set_fact:
    harbor_api_validate_certs: "{{ harbor_config.validate_certs | default(not (ci_mode | default(false))) }}"
    harbor_validate_registry_mirrors: "{{ harbor_config.validate_registry_mirrors | default(false) }}"
    harbor_registry_mirrors: "{{ harbor_config.registry_mirrors | default([]) }}"
    harbor_allowed_auth_modes:
      - "db_auth"
      - "oidc_auth"

- name: Validate Harbor registry mirror declarations
  ansible.builtin.assert:
    that:
      - harbor_mirror_item.name | default('', true) | length > 0
      - harbor_mirror_item.url | default('', true) | length > 0
      - harbor_mirror_item.type | default('docker-hub') in ['docker-hub', 'docker-registry', 'github-ghcr', 'harbor', 'quay']
      - not ((harbor_validate_registry_mirrors | bool) or (harbor_mirror_item.validation.enabled | default(false) | bool)) or (harbor_mirror_item.validation.image | default('', true) | length > 0)
    fail_msg: "Each harbor_config.registry_mirrors item requires name, url, and a supported type."
  loop: "{{ harbor_registry_mirrors }}"
  loop_control:
    loop_var: harbor_mirror_item
    label: "{{ harbor_mirror_item.name | default('unnamed') }}"
  no_log: true

- name: Build Harbor OIDC facts
  ansible.builtin.set_fact:
    harbor_oidc_client_id: "{{ oidc_clients.harbor.client_id | default('harbor', true) if (ci_mode | default(false)) else (oidc_clients.harbor.client_id | default('', true)) }}"
    harbor_oidc_client_secret: "{{ oidc_clients.harbor.client_secret | default('ci-oidc-harbor-client-secret', true) if (ci_mode | default(false)) else (oidc_clients.harbor.client_secret | default('', true)) }}"
    harbor_oidc_endpoint: "{{ harbor_config.oidc.endpoint if (harbor_config.oidc.endpoint | default('', true) | length > 0) else ('https://' ~ service_domains.keycloak ~ '/realms/' ~ (((keycloak_config | default({})).realm | default({})).name | default('homelab'))) }}"
    harbor_oidc_scope: "{{ harbor_config.oidc.scope | default('openid,profile,email,offline_access') }}"
    harbor_oidc_verify_cert: "{{ harbor_config.oidc.verify_cert | default(not (ci_mode | default(false))) }}"
    harbor_oidc_user_claim: "{{ harbor_config.oidc.user_claim | default('preferred_username') }}"
    harbor_oidc_groups_claim: "{{ harbor_config.oidc.groups_claim | default('groups') }}"
    harbor_oidc_admin_group: "{{ harbor_config.oidc.admin_group | default('') }}"
    harbor_oidc_auto_onboard: "{{ harbor_config.oidc.auto_onboard | default(true) }}"
  when: harbor_config.oidc.enabled | default(false)
  no_log: true

- name: Validate required Harbor OIDC client settings
  ansible.builtin.assert:
    that:
      - harbor_required_oidc_values[item.key] | length > 0
    fail_msg: "{{ item.path }} is required when ci_mode is false. Define it in the inventory, preferably in secrets.sops.yaml."
  vars:
    harbor_required_oidc_values:
      harbor_client_id: "{{ harbor_oidc_client_id }}"
      harbor_client_secret: "{{ harbor_oidc_client_secret }}"
  loop:
    - { path: "oidc_clients.harbor.client_id", key: "harbor_client_id" }
    - { path: "oidc_clients.harbor.client_secret", key: "harbor_client_secret" }
  loop_control:
    label: "{{ item.path }}"
  when:
    - harbor_config.oidc.enabled | default(false)
    - not (ci_mode | default(false))

- name: Require Harbor OIDC endpoint
  ansible.builtin.assert:
    that:
      - harbor_oidc_endpoint | length > 0
    fail_msg: "harbor_config.oidc.endpoint is required when harbor_config.oidc.enabled=true"
  when:
    - harbor_config.oidc.enabled | default(false)
  no_log: true

- name: Require Harbor OIDC scope to include offline_access
  ansible.builtin.assert:
    that:
      - "'offline_access' in (harbor_oidc_scope.split(',') | map('trim') | list)"
    fail_msg: "harbor_config.oidc.scope must include offline_access."
  when: harbor_config.oidc.enabled | default(false)
  no_log: true

- name: Build Harbor OIDC payload
  ansible.builtin.set_fact:
    harbor_oidc_configuration_payload:
      auth_mode: "oidc_auth"
      primary_auth_mode: true
      oidc_name: "keycloak"
      oidc_endpoint: "{{ harbor_oidc_endpoint }}"
      oidc_client_id: "{{ harbor_oidc_client_id }}"
      oidc_client_secret: "{{ harbor_oidc_client_secret }}"
      oidc_scope: "{{ harbor_oidc_scope }}"
      oidc_user_claim: "{{ harbor_oidc_user_claim }}"
      oidc_groups_claim: "{{ harbor_oidc_groups_claim }}"
      oidc_admin_group: "{{ harbor_oidc_admin_group }}"
      oidc_auto_onboard: "{{ harbor_oidc_auto_onboard }}"
      oidc_verify_cert: "{{ harbor_oidc_verify_cert }}"
  when: harbor_config.oidc.enabled | default(false)
  no_log: true

- name: Wait for Harbor API health
  ansible.builtin.uri:
    url: "{{ harbor_config_url | default('https://' ~ service_domains.harbor) }}/api/v2.0/health"
    method: GET
    user: admin
    password: "{{ harbor_runtime.admin_password | default(harbor.admin_password | mandatory('harbor.admin_password is required')) }}"
    force_basic_auth: true
    validate_certs: "{{ harbor_api_validate_certs }}"
    status_code: 200
  register: harbor_health
  until: harbor_health.status == 200
  retries: 30
  delay: 5
  when: not (harbor_config_test_mode | default(false))
  no_log: true

- name: Read Harbor authentication configuration
  ansible.builtin.uri:
    url: "{{ harbor_config_url | default('https://' ~ service_domains.harbor) }}/api/v2.0/configurations"
    method: GET
    user: admin
    password: "{{ harbor_runtime.admin_password | default(harbor.admin_password | mandatory('harbor.admin_password is required')) }}"
    force_basic_auth: true
    validate_certs: "{{ harbor_api_validate_certs }}"
    status_code: 200
  register: harbor_current_configuration
  when:
    - harbor_config.oidc.enabled | default(false)
    - not (harbor_config_test_mode | default(false))
  no_log: true

- name: Normalize Harbor current auth mode
  ansible.builtin.set_fact:
    harbor_current_auth_mode: >-
      {{
        (
          harbor_current_configuration.json.auth_mode.value
          if harbor_current_configuration.json.auth_mode is mapping
          else harbor_current_configuration.json.auth_mode
        ) | default('unknown', true)
      }}
  when:
    - harbor_config.oidc.enabled | default(false)
    - not (harbor_config_test_mode | default(false))
  no_log: true

- name: Fail when Harbor auth mode cannot be safely migrated to OIDC
  ansible.builtin.assert:
    that:
      - harbor_current_auth_mode in harbor_allowed_auth_modes
    fail_msg: "Harbor OIDC configuration only supports existing auth_mode values {{ harbor_allowed_auth_modes | join(', ') }}. Current value: {{ harbor_current_auth_mode | default('unknown') }}."
  when:
    - harbor_config.oidc.enabled | default(false)
    - not (harbor_config_test_mode | default(false))
  no_log: true

- name: Read Harbor users before switching auth mode
  ansible.builtin.uri:
    url: "{{ harbor_config_url | default('https://' ~ service_domains.harbor) }}/api/v2.0/users?page=1&page_size=100"
    method: GET
    user: admin
    password: "{{ harbor_runtime.admin_password | default(harbor.admin_password | mandatory('harbor.admin_password is required')) }}"
    force_basic_auth: true
    validate_certs: "{{ harbor_api_validate_certs }}"
    status_code: 200
  register: harbor_users_response
  when:
    - harbor_config.oidc.enabled | default(false)
    - not (harbor_config_test_mode | default(false))
    - harbor_current_auth_mode == 'db_auth'
  no_log: true

- name: Collect Harbor local non-admin users
  ansible.builtin.set_fact:
    harbor_local_non_admin_users: "{{ (harbor_local_non_admin_users | default([])) + [item] }}"
  loop: "{{ harbor_users_response.json | default([]) }}"
  loop_control:
    label: "{{ item.username | default('unknown') }}"
  vars:
    harbor_user_source: "{{ item.source | default('local') | string | lower }}"
    harbor_user_is_local: "{{ (harbor_user_source in ['0', 'local', 'db_auth']) or ((item.source is not defined) and ((item.oidc_user_meta | default(none)) is none)) }}"
  when:
    - harbor_config.oidc.enabled | default(false)
    - not (harbor_config_test_mode | default(false))
    - harbor_current_auth_mode == 'db_auth'
    - not (item.sysadmin_flag | default(false))
    - item.username | default('') != 'admin'
    - harbor_user_is_local
  no_log: true

- name: Refuse Harbor OIDC migration when local non-admin users exist
  ansible.builtin.fail:
    msg: "Cannot switch Harbor from db_auth to OIDC while local non-admin users exist: {{ (harbor_local_non_admin_users | default([])) | map(attribute='username') | join(', ') }}. Migrate or remove those users first."
  when:
    - harbor_config.oidc.enabled | default(false)
    - not (harbor_config_test_mode | default(false))
    - harbor_current_auth_mode == 'db_auth'
    - (harbor_local_non_admin_users | default([]) | length) > 0
  no_log: true

- name: Configure Harbor OIDC SSO
  ansible.builtin.uri:
    url: "{{ harbor_config_url | default('https://' ~ service_domains.harbor) }}/api/v2.0/configurations"
    method: PUT
    user: admin
    password: "{{ harbor_runtime.admin_password | default(harbor.admin_password | mandatory('harbor.admin_password is required')) }}"
    force_basic_auth: true
    validate_certs: "{{ harbor_api_validate_certs }}"
    body_format: json
    body: "{{ harbor_oidc_configuration_payload }}"
    status_code: [200, 404, 502, 503]
  register: harbor_oidc_configure_response
  until: harbor_oidc_configure_response.status == 200
  retries: 12
  delay: 5
  when:
    - harbor_config.oidc.enabled | default(false)
    - not (harbor_config_test_mode | default(false))
  no_log: true

- name: Ensure Harbor registry mirrors are declared
  ansible.builtin.include_tasks: mirror.yml
  loop: "{{ harbor_registry_mirrors }}"
  loop_control:
    loop_var: harbor_mirror_item
    label: "{{ harbor_mirror_item.name }}"
  when: not (harbor_config_test_mode | default(false))
