---
- name: Compute Cloudflare local ingress mode
  ansible.builtin.set_fact:
    traefik_external_services: "{{ (traefik | default({})).external_services | default([]) }}"
    cloudflare_local_ingress_enabled: >-
      {{
        ((traefik | default({})).external_services | default([]))
        | selectattr('cloudflare', 'defined')
        | selectattr('cloudflare')
        | list
        | length > 0
      }}

- name: Ensure cloudflared stack directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/cloudflared"
    state: directory
    mode: "0755"
  when: (cloudflare.enabled | default(true)) | bool

- name: Copy cloudflared stack files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../stacks/cloudflared/"
    dest: "{{ admin_node_root }}/stacks/cloudflared/"
    owner: root
    group: root
    mode: preserve
  when: (cloudflare.enabled | default(true)) | bool

- name: Render cloudflared compose
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/cloudflared/compose.yaml"
    dest: "{{ admin_node_root }}/stacks/cloudflared/compose.yaml"
    owner: root
    group: root
    mode: "0644"
  when: (cloudflare.enabled | default(true)) | bool

- name: Render cloudflared local ingress config
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/cloudflared/config.yml.tpl"
    dest: "{{ admin_node_root }}/stacks/cloudflared/config.yml"
    owner: root
    group: root
    mode: "0600"
  when:
    - (cloudflare.enabled | default(true)) | bool
    - cloudflare_local_ingress_enabled | bool

- name: Render cloudflared credentials file
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/stacks/cloudflared/credentials.json"
    owner: root
    group: root
    mode: "0600"
    content: "{{ cloudflare.credentials_json | mandatory('cloudflare.credentials_json is required when an external service enables cloudflare') }}"
  no_log: true
  when:
    - (cloudflare.enabled | default(true)) | bool
    - cloudflare_local_ingress_enabled | bool

- name: Render cloudflared env
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/env/cloudflared.env"
    mode: "0600"
    content: |
      {% if not (cloudflare_local_ingress_enabled | bool) %}
      CLOUDFLARE_TUNNEL_TOKEN={{ cloudflare.tunnel_token | mandatory('cloudflare.tunnel_token is required') }}
      {% endif %}
  no_log: true
  when: (cloudflare.enabled | default(true)) | bool

- name: Recreate cloudflared mock container when AppArmor becomes active
  ansible.builtin.command: docker rm -f cloudflared
  when:
    - (cloudflare.enabled | default(true)) | bool
    - ci_mode | default(false) | bool
    - hardening.apparmor.enabled | default(true) | bool
    - admin_apparmor_runtime_active | default(false) | bool
    - (hardening.apparmor.profiles | default({})).cloudflared | default(true) | bool
  register: remove_mock_cloudflared
  failed_when: false
  changed_when: remove_mock_cloudflared.rc == 0

- name: Start cloudflared mock container (CI mode)
  ansible.builtin.command: >-
    docker run -d --name cloudflared --network admin-net --restart no
    {% if (hardening.apparmor.enabled | default(true) | bool) and (admin_apparmor_runtime_active | default(false) | bool) and ((hardening.apparmor.profiles | default({})).cloudflared | default(true) | bool) %}
    --security-opt apparmor=admin-node-cloudflared
    {% endif %}
    alpine sleep 3600
  when:
    - (cloudflare.enabled | default(true)) | bool
    - ci_mode | default(false) | bool
  register: mock_cloudflared
  failed_when: false
  changed_when: mock_cloudflared.rc == 0

- name: Start cloudflared stack (production)
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/cloudflared.env -f compose.yaml up --wait --wait-timeout 300
  args:
    chdir: "{{ admin_node_root }}/stacks/cloudflared"
  when:
    - (cloudflare.enabled | default(true)) | bool
    - not (ci_mode | default(false))
  changed_when: true
