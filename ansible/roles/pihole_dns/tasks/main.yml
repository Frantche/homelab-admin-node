---
- name: Build Pi-hole API facts
  ansible.builtin.set_fact:
    pihole_api_url: "{{ pihole.api_url | regex_replace('/+$', '') }}"
    pihole_api_validate_certs: "{{ pihole.validate_certs | default(not (ci_mode | default(false))) }}"
    pihole_effective_dns_records: "{{ pihole.dns_records | default([]) }}"

- name: Add Traefik external services to Pi-hole DNS records
  ansible.builtin.set_fact:
    pihole_effective_dns_records: "{{ pihole_effective_dns_records + [{'name': item.hostname, 'ip': admin_node_lan_ip}] }}"
  loop: "{{ (traefik | default({})).external_services | default([]) }}"
  loop_control:
    label: "{{ item.hostname | default(item.name | default('unnamed')) }}"
  when: item.pihole_dns | default(false) | bool

- name: Probe Pi-hole v6 API when auto-detecting
  ansible.builtin.uri:
    url: "{{ pihole_api_url }}/api/auth"
    method: GET
    status_code: [200, 401, 404]
    validate_certs: "{{ pihole_api_validate_certs }}"
  register: pihole_v6_probe
  changed_when: false
  when:
    - (pihole.enabled | default(true)) | bool
    - (pihole.api_version | default('auto')) == 'auto'
    - not ansible_check_mode

- name: Select Pi-hole API version
  ansible.builtin.set_fact:
    pihole_api_version_effective: >-
      {{
        'v6'
        if (
          (pihole.api_version | default('auto')) == 'v6'
          or (
            (pihole.api_version | default('auto')) == 'auto'
            and (pihole_v6_probe.status | default(404)) in [200, 401]
          )
        )
        else 'v5'
      }}
  when: (pihole.enabled | default(true)) | bool

- name: Select pihole API task file
  ansible.builtin.include_tasks: "{{ selected_api_file }}"
  vars:
    selected_api_file: "{{ 'api_v6.yml' if pihole_api_version_effective == 'v6' else 'api_v5.yml' }}"
  when:
    - (pihole.enabled | default(true)) | bool
    - not ansible_check_mode

- name: Validate pihole dns records
  ansible.builtin.include_tasks: validate.yml
  when: (pihole.enabled | default(true)) | bool
