---
- name: Validate Pi-hole API reachability
  ansible.builtin.uri:
    url: "{{ pihole_api_url }}/{{ 'api/auth' if pihole_api_version_effective == 'v6' else 'admin/api.php' }}"
    method: GET
    status_code: "{{ [200, 401] if pihole_api_version_effective == 'v6' else 200 }}"
    validate_certs: "{{ pihole_api_validate_certs }}"

- name: Validate DNS resolution for configured records
  ansible.builtin.command: getent ahostsv4 {{ item.name }}
  register: dns_results
  changed_when: false
  loop: "{{ pihole_effective_dns_records }}"

- name: Assert DNS records resolve to expected IP
  ansible.builtin.assert:
    that:
      - item.item.ip in (item.stdout_lines | map('split') | map('first') | list)
    fail_msg: "DNS record {{ item.item.name }} does not resolve to {{ item.item.ip }}"
  loop: "{{ dns_results.results }}"
