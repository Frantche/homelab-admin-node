---
- name: Compute Traefik TLS mode
  ansible.builtin.set_fact:
    traefik_letsencrypt_enabled: "{{ (not (ci_mode | default(false))) and (not (traefik.local_tls_enabled | default(false))) and ((cloudflare.enabled | default(true)) | bool) and ((cloudflare.dns_api_token | default('') | length) > 0) and ((acme_email | default('') | length) > 0) }}"
    traefik_local_ca_enabled: "{{ (ci_mode | default(false)) or (traefik.local_tls_enabled | default(false)) or (not ((cloudflare.enabled | default(true)) | bool)) or ((cloudflare.dns_api_token | default('') | length) == 0) or ((acme_email | default('') | length) == 0) }}"
    traefik_external_services: "{{ (traefik | default({})).external_services | default([]) }}"

- name: Validate Traefik external services
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name is match('^[A-Za-z0-9][A-Za-z0-9_-]*$')
      - item.hostname is defined
      - item.hostname | length > 0
      - item.url is defined
      - item.url is match('^https?://')
      - not (((item.tls | default({})).verify | default(true) | bool == false) and (((item.tls | default({})).ca_pem | default('', true) | length) > 0))
    fail_msg: "Invalid traefik.external_services item. Required: name, hostname, http(s) url. tls.verify=false cannot be combined with tls.ca_pem."
  loop: "{{ traefik_external_services }}"
  loop_control:
    label: "{{ item.name | default(item.hostname | default('unnamed')) }}"

- name: Compute local TLS expected DNS names
  ansible.builtin.set_fact:
    traefik_local_tls_expected_dns_names: "{{ ((service_domains | dict2items | map(attribute='value') | list) + (traefik_external_services | map(attribute='hostname') | list) + (admin_node_fqdn | default('', true)).split() + ['localhost']) | unique }}"
  when: not traefik_letsencrypt_enabled

- name: Ensure traefik stack directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/traefik"
    state: directory
    mode: "0755"

- name: Ensure traefik dynamic config directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/traefik/dynamic"
    state: directory
    mode: "0755"

- name: Ensure Traefik external service CA directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/certs/traefik-external-services"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: >-
    (traefik_external_services
    | selectattr('tls', 'defined')
    | selectattr('tls.ca_pem', 'defined')
    | list
    | length) > 0

- name: Render Traefik external service CA files
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/certs/traefik-external-services/{{ item.name }}-ca.pem"
    owner: root
    group: root
    mode: "0644"
    content: "{{ item.tls.ca_pem }}"
  loop: "{{ traefik_external_services }}"
  loop_control:
    label: "{{ item.name }}"
  when: ((item.tls | default({})).ca_pem | default('', true) | length) > 0

- name: Ensure letsencrypt data directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/data/traefik/letsencrypt"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Copy traefik static stack files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../stacks/traefik/{{ item }}"
    dest: "{{ admin_node_root }}/stacks/traefik/{{ item }}"
    owner: root
    group: root
    mode: preserve
  loop:
    - compose.yaml
    - traefik.yml
    - traefik-ci.yml

- name: Render traefik compose
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/traefik/compose.yaml"
    dest: "{{ admin_node_root }}/stacks/traefik/compose.yaml"
    owner: root
    group: root
    mode: "0644"

- name: Check local TLS certificate files
  ansible.builtin.stat:
    path: "{{ admin_node_root }}/certs/{{ item }}"
  loop:
    - ca-key.pem
    - ca.pem
    - root-ca.pem
    - key.pem
    - cert.pem
  register: traefik_local_tls_files
  when: not traefik_letsencrypt_enabled

- name: Compute local TLS certificate renewal need
  ansible.builtin.set_fact:
    traefik_local_tls_missing: "{{ traefik_local_tls_files.results | selectattr('stat.exists', 'equalto', false) | list | length > 0 }}"
  when: not traefik_letsencrypt_enabled

- name: Inspect local TLS certificate
  ansible.builtin.command: openssl x509 -in {{ admin_node_root }}/certs/cert.pem -noout -checkend 2592000 -ext subjectAltName
  register: traefik_local_tls_certificate_inspection
  changed_when: false
  failed_when: false
  when:
    - not traefik_letsencrypt_enabled
    - not (traefik_local_tls_missing | bool)

- name: Compute local TLS certificate renewal need from certificate content
  ansible.builtin.set_fact:
    traefik_local_tls_renewal_needed: >-
      {{
        (traefik_local_tls_missing | bool)
        or (traefik_local_tls_certificate_inspection.rc | default(1) != 0)
        or (
          traefik_local_tls_expected_dns_names
          | reject('in', traefik_local_tls_certificate_inspection.stdout | default(''))
          | list
          | length > 0
        )
        or ('IP Address:' ~ admin_node_lan_ip not in (traefik_local_tls_certificate_inspection.stdout | default('')))
      }}
  when: not traefik_letsencrypt_enabled

- name: Generate local CA and fallback TLS certificate
  ansible.builtin.shell: |
    set -euo pipefail
    work_dir="$(mktemp -d)"
    trap 'rm -rf "$work_dir"' EXIT

    openssl genrsa -out "$work_dir/ca-key.pem" 4096
    openssl req -new -key "$work_dir/ca-key.pem" -out "$work_dir/ca.csr" -subj "/CN=Admin Node Local CA"
    cat > "$work_dir/ca.ext" <<'EOF'
    [v3_ca]
    basicConstraints=critical,CA:TRUE
    keyUsage=critical,keyCertSign,cRLSign
    subjectKeyIdentifier=hash
    authorityKeyIdentifier=keyid,issuer
    EOF
    openssl x509 -req -days 3650 -in "$work_dir/ca.csr" -signkey "$work_dir/ca-key.pem" -out "$work_dir/ca.pem" -extfile "$work_dir/ca.ext" -extensions v3_ca

    openssl genrsa -out "$work_dir/key.pem" 2048
    openssl req -new -key "$work_dir/key.pem" -out "$work_dir/server.csr" -subj "/CN={{ service_domains.traefik }}"
    cat > "$work_dir/server.ext" <<'EOF'
    [server_cert]
    basicConstraints=critical,CA:FALSE
    keyUsage=critical,digitalSignature,keyEncipherment
    extendedKeyUsage=serverAuth
    subjectAltName={{ (traefik_local_tls_expected_dns_names | map('regex_replace', '^(.*)$', 'DNS:\1') | list + ['IP:127.0.0.1', 'IP:' ~ admin_node_lan_ip]) | join(',') }}
    EOF
    openssl x509 -req -days 825 -in "$work_dir/server.csr" -CA "$work_dir/ca.pem" -CAkey "$work_dir/ca-key.pem" -CAcreateserial -out "$work_dir/cert.pem" -extfile "$work_dir/server.ext" -extensions server_cert

    install -m 0600 -o root -g root "$work_dir/ca-key.pem" "{{ admin_node_root }}/certs/ca-key.pem"
    install -m 0600 -o root -g root "$work_dir/key.pem" "{{ admin_node_root }}/certs/key.pem"
    install -m 0644 -o root -g root "$work_dir/ca.pem" "{{ admin_node_root }}/certs/ca.pem"
    install -m 0644 -o root -g root "$work_dir/ca.pem" "{{ admin_node_root }}/certs/root-ca.pem"
    install -m 0644 -o root -g root "$work_dir/cert.pem" "{{ admin_node_root }}/certs/cert.pem"
  args:
    executable: /bin/bash
  when:
    - not traefik_letsencrypt_enabled
    - traefik_local_tls_renewal_needed | bool

- name: Lock down local TLS private keys
  ansible.builtin.file:
    path: "{{ admin_node_root }}/certs/{{ item }}"
    owner: root
    group: root
    mode: "0600"
  loop:
    - ca-key.pem
    - key.pem
  when: not traefik_letsencrypt_enabled

- name: Ensure local TLS public certificates are readable
  ansible.builtin.file:
    path: "{{ admin_node_root }}/certs/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - ca.pem
    - root-ca.pem
    - cert.pem
  when: not traefik_letsencrypt_enabled

- name: Check update-ca-trust support
  ansible.builtin.shell: command -v update-ca-trust
  register: traefik_update_ca_trust
  changed_when: false
  failed_when: false
  when: not traefik_letsencrypt_enabled

- name: Check update-ca-certificates support
  ansible.builtin.shell: command -v update-ca-certificates
  register: traefik_update_ca_certificates
  changed_when: false
  failed_when: false
  when: not traefik_letsencrypt_enabled

- name: Install local CA in update-ca-trust anchors
  ansible.builtin.copy:
    src: "{{ admin_node_root }}/certs/ca.pem"
    dest: /etc/ca-certificates/trust-source/anchors/admin-node-local-ca.crt
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  register: traefik_local_ca_trust_anchor
  when:
    - not traefik_letsencrypt_enabled
    - traefik_update_ca_trust.rc == 0

- name: Update CA trust
  ansible.builtin.command: update-ca-trust
  changed_when: traefik_local_ca_trust_anchor.changed
  when:
    - not traefik_letsencrypt_enabled
    - traefik_update_ca_trust.rc == 0
    - traefik_local_ca_trust_anchor.changed

- name: Install local CA in update-ca-certificates anchors
  ansible.builtin.copy:
    src: "{{ admin_node_root }}/certs/ca.pem"
    dest: /usr/local/share/ca-certificates/admin-node-local-ca.crt
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  register: traefik_local_ca_certificate_anchor
  when:
    - not traefik_letsencrypt_enabled
    - traefik_update_ca_trust.rc != 0
    - traefik_update_ca_certificates.rc == 0

- name: Update CA certificates
  ansible.builtin.command: update-ca-certificates
  changed_when: traefik_local_ca_certificate_anchor.changed
  when:
    - not traefik_letsencrypt_enabled
    - traefik_update_ca_trust.rc != 0
    - traefik_update_ca_certificates.rc == 0
    - traefik_local_ca_certificate_anchor.changed

- name: Ensure Docker trust directory for Harbor local CA
  ansible.builtin.file:
    path: "/etc/docker/certs.d/{{ service_domains.harbor }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: not traefik_letsencrypt_enabled

- name: Install local CA for Docker Harbor registry trust
  ansible.builtin.copy:
    src: "{{ admin_node_root }}/certs/ca.pem"
    dest: "/etc/docker/certs.d/{{ service_domains.harbor }}/ca.crt"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  register: traefik_docker_harbor_ca
  when: not traefik_letsencrypt_enabled

- name: Restart Docker after Harbor registry CA changes
  ansible.builtin.service:
    name: docker
    state: restarted
  when:
    - not traefik_letsencrypt_enabled
    - traefik_docker_harbor_ca.changed

- name: Render traefik static config (production)
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/traefik/traefik.yml"
    dest: "{{ admin_node_root }}/stacks/traefik/traefik.yml"
    owner: root
    group: root
    mode: "0644"
  when: not (ci_mode | default(false))

- name: Render traefik static config (CI - no ACME)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../stacks/traefik/traefik-ci.yml"
    dest: "{{ admin_node_root }}/stacks/traefik/traefik.yml"
    owner: root
    group: root
    mode: "0644"
  when: ci_mode | default(false)

- name: Render traefik dynamic config
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/traefik/dynamic/config.yml"
    dest: "{{ admin_node_root }}/stacks/traefik/dynamic/config.yml"
    owner: root
    group: root
    mode: "0600"
  vars:
    TRAEFIK_DASHBOARD_BASIC_AUTH: "{{ admin.traefik_dashboard_basic_auth | mandatory('admin.traefik_dashboard_basic_auth is required') }}"
  no_log: true

- name: Deploy default TLS dynamic config
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/stacks/traefik/dynamic/tls-default.yml"
    owner: root
    group: root
    mode: "0644"
    content: |
      tls:
        stores:
          default:
            defaultCertificate:
              certFile: /certs/cert.pem
              keyFile: /certs/key.pem
  when: not traefik_letsencrypt_enabled

- name: Remove default TLS dynamic config when LetsEncrypt is enabled
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/traefik/dynamic/tls-default.yml"
    state: absent
  when: traefik_letsencrypt_enabled

- name: Render traefik env
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/env/traefik.env"
    owner: root
    group: root
    mode: "0600"
    content: |
      TRAEFIK_DASHBOARD_BASIC_AUTH={{ admin.traefik_dashboard_basic_auth | mandatory('admin.traefik_dashboard_basic_auth is required') | replace('$', '$$') }}
      CF_DNS_API_TOKEN={{ cloudflare.dns_api_token | default('ci-not-used') | replace('$', '$$') }}
  no_log: true

- name: Start traefik stack
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/traefik.env -f compose.yaml up --wait --wait-timeout 300
  args:
    chdir: "{{ admin_node_root }}/stacks/traefik"
  changed_when: true
