---
- name: Ensure traefik stack directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/stacks/traefik"
    state: directory
    mode: "0755"

- name: Ensure letsencrypt data directory
  ansible.builtin.file:
    path: "{{ admin_node_root }}/data/traefik/letsencrypt"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Copy traefik stack files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../stacks/traefik/"
    dest: "{{ admin_node_root }}/stacks/traefik/"
    owner: root
    group: root
    mode: preserve

- name: Render traefik compose
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/traefik/compose.yaml"
    dest: "{{ admin_node_root }}/stacks/traefik/compose.yaml"
    owner: root
    group: root
    mode: "0644"

- name: Render traefik static config (production)
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/traefik/traefik.yml"
    dest: "{{ admin_node_root }}/stacks/traefik/traefik.yml"
    owner: root
    group: root
    mode: "0644"
  when: not (ci_mode | default(false))

- name: Render traefik static config (CI - no ACME)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../stacks/traefik/traefik-ci.yml"
    dest: "{{ admin_node_root }}/stacks/traefik/traefik.yml"
    owner: root
    group: root
    mode: "0644"
  when: ci_mode | default(false)

- name: Render traefik dynamic config
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../stacks/traefik/dynamic/config.yml"
    dest: "{{ admin_node_root }}/stacks/traefik/dynamic/config.yml"
    owner: root
    group: root
    mode: "0600"
  vars:
    TRAEFIK_DASHBOARD_BASIC_AUTH: "{{ admin.traefik_dashboard_basic_auth | mandatory('admin.traefik_dashboard_basic_auth is required') }}"
  no_log: true

- name: Deploy CI TLS dynamic config
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/stacks/traefik/dynamic/tls-ci.yml"
    owner: root
    group: root
    mode: "0644"
    content: |
      tls:
        stores:
          default:
            defaultCertificate:
              certFile: /certs/cert.pem
              keyFile: /certs/key.pem
  when: ci_mode | default(false)

- name: Render traefik env
  ansible.builtin.copy:
    dest: "{{ admin_node_root }}/env/traefik.env"
    owner: root
    group: root
    mode: "0600"
    content: |
      TRAEFIK_DASHBOARD_BASIC_AUTH={{ admin.traefik_dashboard_basic_auth | mandatory('admin.traefik_dashboard_basic_auth is required') | replace('$', '$$') }}
      CF_DNS_API_TOKEN={{ cloudflare.dns_api_token | default('ci-not-used') | replace('$', '$$') }}
  no_log: true

- name: Start traefik stack
  ansible.builtin.command: docker compose --env-file {{ admin_node_root }}/env/traefik.env -f compose.yaml up -d
  args:
    chdir: "{{ admin_node_root }}/stacks/traefik"
  changed_when: true
