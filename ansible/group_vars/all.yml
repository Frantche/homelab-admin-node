admin_repo_url: "ssh://git@example.com/homelab/homelab-admin-node.git"
admin_node_root: "/srv/admin"
admin_mode_file: "/etc/admin-node/mode"
admin_git_ref_file: "/etc/admin-node/git-ref"
admin_node_lan_ip: "192.168.1.10"
acme_email: "admin@example.com"

traefik:
  dashboard_enabled: true
  dashboard_hostname: "traefik.example.com"
  log_level: "INFO"
  access_logs: true
  local_tls_enabled: false

service_domains:
  harbor: "harbor.example.com"
  openbao: "bao.example.com"
  keycloak: "keycloak.example.com"
  gitea: "git.example.com"
  traefik: "traefik.example.com"

pihole:
  enabled: true
  api_version: "auto"
  url: "http://pihole.local/admin"
  api_url: "http://pihole.local"
  dns_records:
    - name: "harbor.example.com"
      ip: "{{ admin_node_lan_ip }}"
    - name: "bao.example.com"
      ip: "{{ admin_node_lan_ip }}"
    - name: "keycloak.example.com"
      ip: "{{ admin_node_lan_ip }}"
    - name: "git.example.com"
      ip: "{{ admin_node_lan_ip }}"
    - name: "traefik.example.com"
      ip: "{{ admin_node_lan_ip }}"

ci:
  mock_pihole: true
  mock_cloudflare_tunnel: true
  skip_public_url_validation: true

ci_mode: false

hardening:
  enabled: true
  ssh:
    allow_users:
      - admin
  sudo:
    nopasswd: true
  firewall:
    ssh_allowed_cidrs:
      - "0.0.0.0/0"
      - "::/0"
    https_allowed_cidrs:
      - "0.0.0.0/0"
      - "::/0"
  fail2ban:
    enabled: true
  auditd:
    enabled: true
  lynis:
    enabled: true

oidc_clients: {}

keycloak_config:
  enabled: false
  realm:
    name: "homelab"
    display_name: "Homelab"
    ssl_required: "external"
  realm_roles: []
  clients: []
  users: []

openbao_config:
  enabled: false
  root_token: ""
  secret_engines: []
  oidc:
    enabled: false
    discovery_url: "https://{{ service_domains.keycloak }}/realms/{{ keycloak_config.realm.name }}"
    default_role: "default"
    role:
      name: "default"
      user_claim: "sub"
      groups_claim: "groups"
      allowed_redirect_uris: []
      bound_audiences: []
      policies: ["default"]

harbor_config:
  enabled: false
  validate_certs: "{{ not (ci_mode | default(false)) }}"
  oidc:
    enabled: false
    endpoint: "https://{{ service_domains.keycloak }}/realms/{{ keycloak_config.realm.name }}"
    verify_cert: "{{ not (ci_mode | default(false)) }}"
    auto_onboard: true
    scope: "openid,profile,email,offline_access"
    user_claim: "preferred_username"
    groups_claim: "groups"
    admin_group: ""
  registry_mirrors: []

gitea_config:
  enabled: false
  validate_certs: "{{ not (ci_mode | default(false)) }}"
  oidc:
    enabled: false
    name: "keycloak"
    discovery_url: "https://{{ service_domains.keycloak }}/realms/{{ keycloak_config.realm.name }}/.well-known/openid-configuration"
    scopes: "openid email profile"
  validation:
    repo: "admin-node-validation"
    issue_title: "Backup restore sentinel"
