admin_repo_url: "ssh://git@example.com/homelab/homelab-admin-node.git"
admin_node_root: "/srv/admin"
admin_mode_file: "/etc/admin-node/mode"
admin_git_ref_file: "/etc/admin-node/git-ref"
admin_node_lan_ip: "192.168.1.10"
acme_email: "admin@example.com"

traefik:
  dashboard_enabled: true
  dashboard_hostname: "traefik.example.com"
  log_level: "INFO"
  access_logs: true
  local_tls_enabled: false

service_domains:
  harbor: "harbor.example.com"
  openbao: "bao.example.com"
  keycloak: "keycloak.example.com"
  traefik: "traefik.example.com"

pihole:
  enabled: true
  api_version: "auto"
  url: "http://pihole.local/admin"
  api_url: "http://pihole.local"
  dns_records:
    - name: "harbor.example.com"
      ip: "{{ admin_node_lan_ip }}"
    - name: "bao.example.com"
      ip: "{{ admin_node_lan_ip }}"
    - name: "keycloak.example.com"
      ip: "{{ admin_node_lan_ip }}"
    - name: "traefik.example.com"
      ip: "{{ admin_node_lan_ip }}"

ci:
  mock_pihole: true
  mock_cloudflare_tunnel: true
  skip_public_url_validation: true

keycloak_config:
  enabled: false
  realm:
    name: "homelab"
    display_name: "Homelab"
    ssl_required: "external"
  realm_roles: []
  clients: []
  users: []

openbao_config:
  enabled: false
  root_token: ""
  secret_engines: []
  oidc:
    enabled: false
    discovery_url: ""
    client_id: ""
    client_secret: ""
    default_role: "default"
    role:
      name: "default"
      user_claim: "sub"
      groups_claim: "groups"
      allowed_redirect_uris: []
      bound_audiences: []
      policies: ["default"]

harbor_config:
  enabled: false
  oidc:
    enabled: false
    endpoint: ""
    client_id: ""
    client_secret: ""
    verify_cert: true
    auto_onboard: true
    scope: "openid,profile,email"
    user_claim: "preferred_username"
    groups_claim: "groups"
    admin_group: ""
  registry_mirrors: []
