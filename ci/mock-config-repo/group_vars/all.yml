# CI mock configuration -- plain text (no SOPS encryption)
# This file mirrors the structure of a real config repo's group_vars/all.yml
# combined with group_vars/secrets.sops.yaml for CI purposes.

ci_mode: true
admin_ci_disable_auto_converge: true

service_domains:
  harbor: "harbor.example.com"
  openbao: "bao.example.com"
  keycloak: "keycloak.example.com"
  gitea: "git.example.com"
  traefik: "traefik.example.com"

oidc_clients:
  harbor:
    client_id: "harbor"
    client_secret: "ci-oidc-harbor-client-secret"
  openbao:
    client_id: "openbao"
    client_secret: "ci-oidc-openbao-client-secret"
  gitea:
    client_id: "gitea"
    client_secret: "ci-oidc-gitea-client-secret"

admin:
  traefik_dashboard_basic_auth: "admin:$$apr1$$ci$$fakehash"

cloudflare:
  tunnel_id: "fake-tunnel-id"
  tunnel_token: "eyJhIjoiZmFrZSIsInQiOiJmYWtlIiwicyI6ImZha2UifQ=="
  account_id: "fake-account-id"
  dns_api_token: "fake-dns-token"
  credentials_json: "{}"

keycloak:
  db_password: "ci-keycloak-db-pass"
  admin_user: "admin"
  admin_password: "ci-keycloak-admin-pass"

harbor:
  admin_password: "ci-Harbor-admin-p4ss"
  db_password: "ci-harbor-db-pass"
  core_secret: "ci-harbor-core-secret"
  jobservice_secret: "ci-harbor-job-secret"
  registry_password: "ci-harbor-registry"

gitea:
  admin_user: "admin"
  admin_password: "ci-Gitea-admin-p4ss"
  db_password: "ci-gitea-db-pass"
  secret_key: "ci-gitea-secret-key-change-me-32chars"
  internal_token: "ci-gitea-internal-token-change-me-32chars"
  jwt_secret: "ci-gitea-jwt-secret-change-me-32chars"

openbao:
  root_token: ""

keycloak_config:
  enabled: true
  realm:
    name: "homelab"
    display_name: "Homelab"
  realm_roles:
    - "admin"
  groups:
    - "admin"
  clients:
    - client_id: "harbor"
      redirect_uris:
        - "https://harbor.example.com/c/oidc/callback"
      web_origins:
        - "https://harbor.example.com"
    - client_id: "openbao"
      redirect_uris:
        - "https://bao.example.com/ui/vault/auth/oidc/oidc/callback"
    - client_id: "gitea"
      redirect_uris:
        - "https://git.example.com/user/oauth2/keycloak/callback"
      web_origins:
        - "https://git.example.com"
  users:
    - username: "ci-sso-user"
      password: "ci-sso-user-password"
      email: "ci-sso-user@example.com"
      first_name: "CI"
      last_name: "SSO"
      email_verified: true
      temporary_password: false
      groups:
        - "admin"

harbor_config:
  enabled: true
  oidc:
    enabled: true
    endpoint: "https://keycloak.example.com/realms/homelab"
    admin_group: "admin"

openbao_config:
  enabled: true
  root_token: ""
  oidc:
    enabled: true
    discovery_url: "https://keycloak.example.com/realms/homelab"
    role:
      allowed_redirect_uris:
        - "https://bao.example.com/ui/vault/auth/oidc/oidc/callback"
      bound_audiences:
        - "openbao"

gitea_config:
  enabled: true
  oidc:
    enabled: true
    discovery_url: "https://keycloak.example.com/realms/homelab/.well-known/openid-configuration"
  validation:
    repo: "admin-node-validation"
    issue_title: "Backup restore sentinel"

observability:
  enabled: true
  metrics_endpoint: "http://127.0.0.1:43190/v1/metrics"
  logs_endpoint: "http://127.0.0.1:43190/v1/logs"
  compression: "none"
  collection_interval: "5s"
  docker_api_version: "1.40"
  mock_backend_enabled: true
  mock_state_dir: "/tmp/admin-node-otel-mock"

backup:
  restic_init_repositories: true
  restic_repositories:
    - name: local
      repository: "/srv/admin/backups/restic"
      password: "ci-restic-pass"
