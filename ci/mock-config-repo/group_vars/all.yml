# CI mock configuration — plain text (no SOPS encryption)
# This file mirrors the structure of a real config repo's group_vars/all.yml
# combined with group_vars/secrets.sops.yaml for CI purposes.

ci_mode: true

admin:
  traefik_dashboard_basic_auth: "admin:$$apr1$$ci$$fakehash"

cloudflare:
  tunnel_id: "fake-tunnel-id"
  tunnel_token: "eyJhIjoiZmFrZSIsInQiOiJmYWtlIiwicyI6ImZha2UifQ=="
  account_id: "fake-account-id"
  dns_api_token: "fake-dns-token"
  credentials_json: "{}"

keycloak:
  db_password: "ci-keycloak-db-pass"
  admin_user: "admin"
  admin_password: "ci-keycloak-admin-pass"

harbor:
  admin_password: "ci-Harbor-admin-p4ss"
  db_password: "ci-harbor-db-pass"
  core_secret: "ci-harbor-core-secret"
  jobservice_secret: "ci-harbor-job-secret"
  registry_password: "ci-harbor-registry"

openbao:
  root_token: ""

backup:
  restic_repository: "/srv/admin/backups/restic"
  restic_password: "ci-restic-pass"

# --- SSO configuration (keycloak_config role) ---
# Enables realm, roles, clients and a CI user in Keycloak.
keycloak_config:
  enabled: true
  realm:
    name: "homelab"
    display_name: "Homelab"
    ssl_required: "external"
  realm_roles:
    - "admin"
    - "viewer"
  clients:
    - client_id: "openbao"
      name: "OpenBao"
      standard_flow_enabled: true
      direct_access_grants_enabled: true
      redirect_uris:
        - "https://bao.example.com/ui/vault/auth/oidc/oidc/callback"
        - "http://localhost:8250/oidc/callback"
      web_origins:
        - "+"
      secret: "ci-openbao-client-secret"
    - client_id: "harbor"
      name: "Harbor"
      standard_flow_enabled: true
      redirect_uris:
        - "https://harbor.example.com/c/oidc/callback"
      web_origins:
        - "+"
      secret: "ci-harbor-client-secret"
  users:
    - username: "ci-admin"
      email: "ci-admin@example.com"
      first_name: "CI"
      last_name: "Admin"
      password: "ci-admin-pass"
      realm_roles:
        - "admin"

# --- OpenBao configuration (openbao_config role) ---
# openbao_root_token is injected at runtime via --extra-vars after openbao-init-ci.sh.
# Discovery URL uses Docker-internal hostname so the OpenBao container can reach
# Keycloak directly on admin-net without TLS complications.
openbao_config:
  enabled: true
  root_token: "{{ openbao_root_token | default('') }}"
  secret_engines:
    - path: "app"
      type: "kv-v2"
  oidc:
    enabled: true
    discovery_url: "http://keycloak:8080/realms/homelab"
    client_id: "openbao"
    client_secret: "ci-openbao-client-secret"
    default_role: "default"
    role:
      name: "default"
      role_type: "jwt"
      user_claim: "preferred_username"
      groups_claim: "groups"
      allowed_redirect_uris:
        - "https://bao.example.com/ui/vault/auth/oidc/oidc/callback"
        - "http://localhost:8250/oidc/callback"
      bound_audiences: []
      policies:
        - "default"

# --- Harbor configuration (harbor_config role) ---
# OIDC endpoint uses Docker-internal hostname so harbor-core can reach
# Keycloak directly on admin-net. verify_cert is false (HTTP, no TLS).
harbor_config:
  enabled: true
  oidc:
    enabled: true
    endpoint: "http://keycloak:8080/realms/homelab"
    client_id: "harbor"
    client_secret: "ci-harbor-client-secret"
    scope: "openid,profile,email"
    verify_cert: false
    auto_onboard: true
    user_claim: "preferred_username"
    groups_claim: "groups"
    admin_group: ""
  registry_mirrors:
    - name: "docker-hub"
      type: "docker-hub"
      url: "https://hub.docker.com"
      description: "Docker Hub proxy cache"
      project_name: "dockerhub-mirror"
      public: true
