---
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ci_mode: false
    service_domains:
      harbor: "harbor.example.com"
      openbao: "bao.example.com"
      keycloak: "keycloak.example.com"
      gitea: "git.example.com"
      traefik: "traefik.example.com"
    gitea:
      admin_user: "admin"
      admin_password: "prod-gitea-admin"
      db_password: "prod-gitea-db"
      secret_key: "prod-gitea-secret-key"
      internal_token: "prod-gitea-internal-token"
      jwt_secret: "prod-gitea-jwt-secret"
    oidc_clients:
      gitea:
        client_id: "gitea"
    keycloak_config:
      enabled: true
      realm:
        name: "homelab"
    harbor_config:
      enabled: false
      oidc:
        enabled: false
    openbao_config:
      enabled: false
      oidc:
        enabled: false
    gitea_config:
      enabled: true
      oidc:
        enabled: true
        discovery_url: "https://keycloak.example.com/realms/homelab/.well-known/openid-configuration"
  tasks:
    - name: Build Gitea secrets in test mode
      ansible.builtin.include_role:
        name: gitea
      vars:
        gitea_test_mode: true

    - name: Trigger Gitea OIDC validation failure
      ansible.builtin.include_role:
        name: gitea_config
      vars:
        gitea_config_test_mode: true
