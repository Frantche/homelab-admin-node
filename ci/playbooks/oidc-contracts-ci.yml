---
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ci_mode: true
    service_domains:
      harbor: "harbor.example.com"
      openbao: "bao.example.com"
      keycloak: "keycloak.example.com"
      gitea: "git.example.com"
      traefik: "traefik.example.com"
    harbor: {}
    gitea: {}
    oidc_clients: {}
    keycloak_config:
      enabled: true
      realm:
        name: "homelab"
      clients:
        - client_id: "harbor"
          redirect_uris:
            - "https://harbor.example.com/c/oidc/callback"
        - client_id: "gitea"
          redirect_uris:
            - "https://git.example.com/user/oauth2/keycloak/callback"
    openbao_config:
      enabled: false
      oidc:
        enabled: false
    harbor_config:
      enabled: true
      oidc:
        enabled: true
        endpoint: "https://keycloak.example.com/realms/homelab"
    gitea_config:
      enabled: true
      oidc:
        enabled: true
        discovery_url: "https://keycloak.example.com/realms/homelab/.well-known/openid-configuration"
  tasks:
    - name: Build Harbor secrets in CI test mode
      ansible.builtin.include_role:
        name: harbor
      vars:
        harbor_test_mode: true

    - name: Build Gitea secrets in CI test mode
      ansible.builtin.include_role:
        name: gitea
      vars:
        gitea_test_mode: true

    - name: Build Keycloak client definitions in CI test mode
      ansible.builtin.include_role:
        name: keycloak_config
      vars:
        keycloak_config_test_mode: true

    - name: Build Harbor OIDC payload in CI test mode
      ansible.builtin.include_role:
        name: harbor_config
      vars:
        harbor_config_test_mode: true

    - name: Build Gitea OIDC facts in CI test mode
      ansible.builtin.include_role:
        name: gitea_config
      vars:
        gitea_config_test_mode: true

    - name: Capture Harbor CI Keycloak client
      ansible.builtin.set_fact:
        harbor_keycloak_client: "{{ keycloak_effective_clients | selectattr('client_id', 'equalto', (oidc_clients.harbor.client_id | default('harbor'))) | list | first | default({}) }}"

    - name: Capture Gitea CI Keycloak client
      ansible.builtin.set_fact:
        gitea_keycloak_client: "{{ keycloak_effective_clients | selectattr('client_id', 'equalto', (oidc_clients.gitea.client_id | default('gitea'))) | list | first | default({}) }}"

    - name: Assert CI mock contracts
      ansible.builtin.assert:
        that:
          - harbor_runtime.db_password == 'ci-harbor-db-pass'
          - harbor_runtime.core_secret == 'ci-harbor-core-secret'
          - harbor_api_validate_certs == false
          - harbor_keycloak_client | length > 0
          - harbor_oidc_configuration_payload.oidc_client_id == (oidc_clients.harbor.client_id | default('harbor'))
          - harbor_oidc_configuration_payload.oidc_client_secret == 'ci-oidc-harbor-client-secret'
          - harbor_oidc_configuration_payload.oidc_verify_cert == false
          - harbor_keycloak_client.secret == 'ci-oidc-harbor-client-secret'
          - gitea_runtime.db_password == 'ci-gitea-db-pass'
          - gitea_keycloak_client | length > 0
          - gitea_keycloak_client.secret == 'ci-oidc-gitea-client-secret'
          - gitea_oidc_client_id == 'gitea'
          - gitea_oidc_client_secret == 'ci-oidc-gitea-client-secret'
