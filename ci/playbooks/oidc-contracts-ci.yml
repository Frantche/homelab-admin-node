---
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ci_mode: true
    service_domains:
      harbor: "harbor.example.com"
      openbao: "bao.example.com"
      keycloak: "keycloak.example.com"
      gitea: "git.example.com"
      traefik: "traefik.example.com"
    harbor: {}
    gitea: {}
    oidc_clients:
      harbor:
        client_id: "ci-harbor-contract"
        client_secret: "ci-harbor-contract-secret"
      openbao:
        client_id: "ci-openbao-contract"
        client_secret: "ci-openbao-contract-secret"
      gitea:
        client_id: "ci-gitea-contract"
        client_secret: "ci-gitea-contract-secret"
    keycloak_config:
      enabled: true
      realm:
        name: "homelab"
      groups:
        - "admin"
      clients:
        - client_id: "harbor"
          redirect_uris:
            - "https://harbor.example.com/c/oidc/callback"
        - client_id: "openbao"
          redirect_uris:
            - "https://bao.example.com/ui/vault/auth/oidc/oidc/callback"
        - client_id: "gitea"
          redirect_uris:
            - "https://git.example.com/user/oauth2/keycloak/callback"
      users:
        - username: "ci-sso-user"
          password: "ci-sso-user-password"
          email: "ci-sso-user@example.com"
          email_verified: true
          groups:
            - "admin"
    openbao_config:
      enabled: true
      oidc:
        enabled: true
    harbor_config:
      enabled: true
      oidc:
        enabled: true
        endpoint: "https://keycloak.example.com/realms/homelab"
    gitea_config:
      enabled: true
      oidc:
        enabled: true
        discovery_url: "https://keycloak.example.com/realms/homelab/.well-known/openid-configuration"
  tasks:
    - name: Build Harbor secrets in CI test mode
      ansible.builtin.include_role:
        name: harbor
      vars:
        harbor_test_mode: true

    - name: Build Gitea secrets in CI test mode
      ansible.builtin.include_role:
        name: gitea
      vars:
        gitea_test_mode: true

    - name: Build Keycloak client definitions in CI test mode
      ansible.builtin.include_role:
        name: keycloak_config
      vars:
        keycloak_config_test_mode: true

    - name: Build Harbor OIDC payload in CI test mode
      ansible.builtin.include_role:
        name: harbor_config
      vars:
        harbor_config_test_mode: true

    - name: Build Gitea OIDC facts in CI test mode
      ansible.builtin.include_role:
        name: gitea_config
      vars:
        gitea_config_test_mode: true

    - name: Capture Harbor CI Keycloak client
      ansible.builtin.set_fact:
        harbor_keycloak_client: "{{ keycloak_effective_clients | selectattr('client_id', 'equalto', (oidc_clients.harbor.client_id | default('harbor'))) | list | first | default({}) }}"

    - name: Capture Harbor CI groups mapper
      ansible.builtin.set_fact:
        harbor_groups_mapper: "{{ harbor_keycloak_client.protocol_mappers | default([]) | selectattr('name', 'equalto', 'groups') | list | first | default({}) }}"

    - name: Capture OpenBao CI Keycloak client
      ansible.builtin.set_fact:
        openbao_keycloak_client: "{{ keycloak_effective_clients | selectattr('client_id', 'equalto', (oidc_clients.openbao.client_id | default('openbao'))) | list | first | default({}) }}"

    - name: Capture OpenBao CI groups mapper
      ansible.builtin.set_fact:
        openbao_groups_mapper: "{{ openbao_keycloak_client.protocol_mappers | default([]) | selectattr('name', 'equalto', 'groups') | list | first | default({}) }}"

    - name: Capture Gitea CI Keycloak client
      ansible.builtin.set_fact:
        gitea_keycloak_client: "{{ keycloak_effective_clients | selectattr('client_id', 'equalto', (oidc_clients.gitea.client_id | default('gitea'))) | list | first | default({}) }}"

    - name: Capture Gitea CI groups mapper
      ansible.builtin.set_fact:
        gitea_groups_mapper: "{{ gitea_keycloak_client.protocol_mappers | default([]) | selectattr('name', 'equalto', 'groups') | list | first | default({}) }}"

    - name: Assert CI mock contracts
      ansible.builtin.assert:
        that:
          - "'admin' in keycloak_config.groups"
          - "(keycloak_config.users | selectattr('username', 'equalto', 'ci-sso-user') | list | first).groups == ['admin']"
          - harbor_runtime.db_password == 'ci-harbor-db-pass'
          - harbor_runtime.core_secret == 'ci-harbor-core-secret'
          - harbor_api_validate_certs == false
          - harbor_keycloak_client | length > 0
          - harbor_groups_mapper | length > 0
          - harbor_groups_mapper.config['claim.name'] == 'groups'
          - harbor_keycloak_client.redirect_uris == ['https://harbor.example.com/c/oidc/callback']
          - harbor_oidc_configuration_payload.oidc_client_id == oidc_clients.harbor.client_id
          - harbor_oidc_configuration_payload.oidc_client_secret == oidc_clients.harbor.client_secret
          - harbor_oidc_configuration_payload.oidc_verify_cert == false
          - harbor_keycloak_client.secret == oidc_clients.harbor.client_secret
          - openbao_keycloak_client | length > 0
          - openbao_keycloak_client.secret == oidc_clients.openbao.client_secret
          - openbao_keycloak_client.redirect_uris == ['https://bao.example.com/ui/vault/auth/oidc/oidc/callback']
          - openbao_groups_mapper | length > 0
          - openbao_groups_mapper.config['claim.name'] == 'groups'
          - gitea_runtime.db_password == 'ci-gitea-db-pass'
          - gitea_keycloak_client | length > 0
          - gitea_keycloak_client.secret == oidc_clients.gitea.client_secret
          - gitea_keycloak_client.redirect_uris == ['https://git.example.com/user/oauth2/keycloak/callback']
          - gitea_groups_mapper | length > 0
          - gitea_groups_mapper.config['claim.name'] == 'groups'
          - gitea_oidc_client_id == oidc_clients.gitea.client_id
          - gitea_oidc_client_secret == oidc_clients.gitea.client_secret
