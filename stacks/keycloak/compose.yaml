services:
  keycloak-db:
    image: pgautoupgrade/pgautoupgrade:18-trixie
    restart: unless-stopped
    container_name: keycloak-db
    command:
      - postgres
      - -c
      - max_wal_size=2GB
      - -c
      - min_wal_size=256MB
      - -c
      - wal_keep_size=128MB
      - -c
      - max_slot_wal_keep_size=512MB
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - /srv/admin/data/keycloak/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "keycloak", "-d", "keycloak"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - admin-net

  keycloak:
    image: keycloak/keycloak:26.7
    container_name: keycloak
    restart: unless-stopped
    command: start --health-enabled=true --http-enabled=true --proxy-headers=xforwarded --hostname-strict=false
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -1 <&3 | grep -q \"200\"'"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 30s
    depends_on:
      keycloak-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=admin-net"
      - "traefik.http.routers.keycloak.rule=Host(`{{ service_domains.keycloak }}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    networks:
      - admin-net

networks:
  admin-net:
    external: true
