services:
  keycloak-db:
    image: pgautoupgrade/pgautoupgrade:18-trixie
    restart: unless-stopped
    container_name: keycloak-db
    command:
      - postgres
      - -c
      - max_wal_size=2GB
      - -c
      - min_wal_size=256MB
      - -c
      - wal_keep_size=128MB
      - -c
      - max_slot_wal_keep_size=512MB
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - /srv/admin/data/keycloak/postgres:/var/lib/postgresql
    networks:
      - admin-net

  keycloak:
    image: keycloak/keycloak:26.6
    container_name: keycloak
    restart: unless-stopped
    command: start --health-enabled=true --http-enabled=true --proxy-headers=xforwarded --hostname-strict=false
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      - keycloak-db
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=admin-net"
      - "traefik.http.routers.keycloak.rule=Host(`{{ service_domains.keycloak }}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    networks:
      - admin-net

networks:
  admin-net:
    external: true
