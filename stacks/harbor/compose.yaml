services:
  harbor-log:
    image: goharbor/harbor-log:v2.15.2@sha256:dad88aa27590f7b7018533f500bd2bb43e64144f5d4abe0e5f23fba88d36332c
    container_name: harbor-log
    restart: "no"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - /srv/admin/data/harbor/log:/var/log/docker
      - ./config/logrotate.conf:/etc/logrotate.d/logrotate.conf:ro
    ports:
      - "127.0.0.1:1514:10514"
    healthcheck:
      test: ["CMD-SHELL", "nc -w 1 127.0.0.1 10514 < /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - harbor-internal
      - harbor-host

  harbor-db:
    image: pgautoupgrade/pgautoupgrade:18-trixie@sha256:b3b850e851029dc949d9b3ae2c032327d9f28dd346e662229cecb2f56f00ee85
    container_name: harbor-db
    restart: "no"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    command:
      - postgres
      - -c
      - max_wal_size=2GB
      - -c
      - min_wal_size=256MB
      - -c
      - wal_keep_size=128MB
      - -c
      - max_slot_wal_keep_size=512MB
    environment:
      POSTGRES_DB: registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${HARBOR_DB_PASSWORD}
    volumes:
      - /srv/admin/data/harbor/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      harbor-log:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "postgresql"
    networks:
      - harbor-internal

  harbor-redis:
    image: goharbor/redis-photon:v2.15.1@sha256:5669d4828805d9ed0bbfc18c101c6ec82d26a13cb9242b48f6348a3e3b2e4cca
    container_name: harbor-redis
    restart: "no"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - /srv/admin/data/harbor/redis:/var/lib/redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      harbor-log:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "redis"
    networks:
      - harbor-internal

  harbor-registry:
    image: goharbor/registry-photon:v2.15.2@sha256:c4ebef61ceb50a3d8bc21d149bc280422db20a1e69df317b64b74098c3615855
    container_name: harbor-registry
    restart: "no"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - /srv/admin/data/harbor/registry:/storage
      - ./config/registry.yml:/etc/registry/config.yml:ro
      - /srv/admin/data/harbor/core/registry.passwd:/etc/registry/passwd:ro
      - /srv/admin/data/harbor/core/token.crt:/etc/registry/root.crt:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/"]
      interval: 10s
      timeout: 5s
      retries: 30
    depends_on:
      harbor-log:
        condition: service_healthy
      harbor-redis:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "registry"
    networks:
      - harbor-internal
      - harbor-egress

  harbor-registryctl:
    image: goharbor/harbor-registryctl:v2.15.2@sha256:223d5cb49d5dbf0ba4ae022e7dd9775fa459904112dc12084d3aaa36c1408362
    container_name: harbor-registryctl
    restart: "no"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    environment:
      CORE_SECRET: ${HARBOR_CORE_SECRET:-harbor-ci-core-secret}
      JOBSERVICE_SECRET: ${HARBOR_JOBSERVICE_SECRET:-harbor-ci-job-secret}
    volumes:
      - /srv/admin/data/harbor/registry:/storage
      - ./config/registry.yml:/etc/registry/config.yml:ro
      - /srv/admin/data/harbor/core/registry.passwd:/etc/registry/passwd:ro
      - /srv/admin/data/harbor/core/token.crt:/etc/registry/root.crt:ro
      - ./config/registryctl.yml:/etc/registryctl/config.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30
    depends_on:
      harbor-log:
        condition: service_healthy
      harbor-registry:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "registryctl"
    networks:
      - harbor-internal

  harbor-core:
    image: goharbor/harbor-core:v2.15.2@sha256:d7b780d23721a000f0fb8e181add6675eafa336de5d033b77fd7da0c171ff7f7
    container_name: harbor-core
    restart: "no"
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    environment:
      PORT: 8080
      CORE_SECRET: ${HARBOR_CORE_SECRET:-harbor-ci-core-secret}
      JOBSERVICE_SECRET: ${HARBOR_JOBSERVICE_SECRET:-harbor-ci-job-secret}
      REGISTRY_CREDENTIAL_USERNAME: harbor_registry_user
      REGISTRY_CREDENTIAL_PASSWORD: ${HARBOR_REGISTRY_PASSWORD}
      _REDIS_URL_CORE: redis://harbor-redis:6379/0
      _REDIS_URL_REG: redis://harbor-redis:6379/1
      DATABASE_TYPE: postgresql
      POSTGRESQL_HOST: harbor-db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: ${HARBOR_DB_PASSWORD}
      POSTGRESQL_DATABASE: registry
      POSTGRESQL_SSLMODE: disable
      POSTGRESQL_MAX_IDLE_CONNS: 50
      POSTGRESQL_MAX_OPEN_CONNS: 100
      POSTGRESQL_CONN_MAX_LIFETIME: 5m
      POSTGRESQL_CONN_MAX_IDLE_TIME: 0
      CONFIG_PATH: /etc/core/app.conf
      EXT_ENDPOINT: https://{{ service_domains.harbor }}
      CORE_URL: http://harbor-core:8080
      CORE_LOCAL_URL: http://127.0.0.1:8080
      PORTAL_URL: http://harbor-portal:8080
      JOBSERVICE_URL: http://harbor-jobservice:8080
      REGISTRY_URL: http://harbor-registry:5000
      REGISTRY_CONTROLLER_URL: http://harbor-registryctl:8080
      TOKEN_SERVICE_URL: http://harbor-core:8080/service/token
      HARBOR_ADMIN_PASSWORD: ${HARBOR_ADMIN_PASSWORD}
      WITH_TRIVY: "true"
      TRIVY_ADAPTER_URL: http://harbor-trivy:8080
      REGISTRY_STORAGE_PROVIDER_NAME: filesystem
      PERMITTED_REGISTRY_TYPES_FOR_PROXY_CACHE: docker-hub,harbor,docker-registry,aws-ecr,azure-acr,google-gcr,quay,github-ghcr,jfrog-artifactory
      REPLICATION_ADAPTER_WHITELIST: ali-acr,aws-ecr,azure-acr,docker-hub,docker-registry,github-ghcr,google-gcr,harbor,huawei-SWR,jfrog-artifactory,tencent-tcr,volcengine-cr
      READ_ONLY: "false"
      LOG_LEVEL: info
      METRIC_ENABLE: "true"
      METRIC_PATH: /metrics
      METRIC_PORT: 8001
      METRIC_NAMESPACE: harbor
      METRIC_SUBSYSTEM: core
{% if traefik_local_ca_enabled | default(ci_mode | default(false)) | bool %}
      SSL_CERT_FILE: /etc/ssl/certs/admin-node-ca.pem
{% endif %}
    volumes:
      - ./config/core-app.conf:/etc/core/app.conf:ro
      - /srv/admin/data/harbor/core/token.key:/etc/core/private_key.pem:ro
      - /srv/admin/data/harbor/core/secretkey:/etc/core/key:ro
      - /srv/admin/data/harbor/core:/data
{% if traefik_local_ca_enabled | default(ci_mode | default(false)) | bool %}
      - /srv/admin/certs/ca.pem:/etc/ssl/certs/admin-node-ca.pem:ro
{% endif %}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v2.0/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 20s
    depends_on:
      harbor-db:
        condition: service_healthy
      harbor-log:
        condition: service_healthy
      harbor-redis:
        condition: service_healthy
      harbor-registry:
        condition: service_healthy
      harbor-registryctl:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "core"
    networks:
      - harbor-internal
      - harbor-egress

  harbor-portal:
    image: goharbor/harbor-portal:v2.15.2@sha256:b811b67f7a7f6f1614e4bdf7478b207d13e8aa3f815ff6ad84f216a5098d213d
    container_name: harbor-portal
    restart: "no"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ./config/portal-nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 30
    depends_on:
      harbor-core:
        condition: service_healthy
      harbor-log:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "portal"
    networks:
      - harbor-internal

  harbor-jobservice:
    image: goharbor/harbor-jobservice:v2.15.2@sha256:f71a4452a095bcd2a8f0683648a3ae28415432df87ccfb00ec7625f3e340a598
    container_name: harbor-jobservice
    restart: "no"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    environment:
      CORE_SECRET: ${HARBOR_CORE_SECRET:-harbor-ci-core-secret}
      JOBSERVICE_SECRET: ${HARBOR_JOBSERVICE_SECRET:-harbor-ci-job-secret}
      CORE_URL: http://harbor-core:8080
      REGISTRY_URL: http://harbor-registry:5000
      REGISTRY_CONTROLLER_URL: http://harbor-registryctl:8080
      REGISTRY_CREDENTIAL_USERNAME: harbor_registry_user
      REGISTRY_CREDENTIAL_PASSWORD: ${HARBOR_REGISTRY_PASSWORD:-harbor-ci-registry}
      LOG_LEVEL: info
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: harbor-core,harbor-jobservice,harbor-registry,harbor-registryctl,harbor-redis,harbor-db,127.0.0.1,localhost
      METRIC_NAMESPACE: harbor
      METRIC_SUBSYSTEM: jobservice
    volumes:
      - /srv/admin/data/harbor/job_logs:/var/log/jobs
      - ./config/jobservice.yml:/etc/jobservice/config.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"401\" ]"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    depends_on:
      harbor-core:
        condition: service_healthy
      harbor-log:
        condition: service_healthy
      harbor-redis:
        condition: service_healthy
      harbor-registryctl:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "jobservice"
    networks:
      - harbor-internal
      - harbor-egress

  harbor-trivy:
    image: goharbor/trivy-adapter-photon:v2.15.2@sha256:215c07b71c37fc7fc16e02d9185d936dcb8884a80e810817c2cd058bbd7c4e98
    container_name: harbor-trivy
    restart: "no"
    cap_drop:
      - ALL
    environment:
      SCANNER_LOG_LEVEL: info
      SCANNER_REDIS_URL: redis://harbor-redis:6379/5
      SCANNER_STORE_REDIS_URL: redis://harbor-redis:6379/5
      SCANNER_STORE_REDIS_NAMESPACE: harbor.scanner.trivy:store
      SCANNER_JOB_QUEUE_REDIS_URL: redis://harbor-redis:6379/5
      SCANNER_JOB_QUEUE_REDIS_NAMESPACE: harbor.scanner.trivy:job-queue
      SCANNER_TRIVY_CACHE_DIR: /home/scanner/.cache/trivy
      SCANNER_TRIVY_REPORTS_DIR: /home/scanner/.cache/reports
      SCANNER_TRIVY_VULN_TYPE: os,library
      SCANNER_TRIVY_SEVERITY: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
      SCANNER_TRIVY_IGNORE_UNFIXED: "false"
      SCANNER_TRIVY_SKIP_UPDATE: "false"
      SCANNER_TRIVY_SKIP_JAVA_DB_UPDATE: "false"
      SCANNER_TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db
      SCANNER_TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db
      SCANNER_TRIVY_OFFLINE_SCAN: "false"
      SCANNER_TRIVY_SECURITY_CHECKS: vuln
      SCANNER_TRIVY_GITHUB_TOKEN: ""
      SCANNER_TRIVY_INSECURE: "false"
      SCANNER_TRIVY_TIMEOUT: 5m0s
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: harbor-core,harbor-jobservice,harbor-registry,harbor-registryctl,harbor-redis,harbor-db,127.0.0.1,localhost
    volumes:
      - /srv/admin/data/harbor/trivy-adapter/trivy:/home/scanner/.cache/trivy
      - /srv/admin/data/harbor/trivy-adapter/reports:/home/scanner/.cache/reports
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/metrics"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    depends_on:
      harbor-log:
        condition: service_healthy
      harbor-redis:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "trivy-adapter"
    networks:
      - harbor-internal
      - harbor-egress

  harbor-exporter:
    image: goharbor/harbor-exporter:v2.15.2@sha256:e1b0a248f61aad5084c5d1612d5f1da89f99c23ce743eaf8cba913d6d00c0547
    container_name: harbor-exporter
    restart: "no"
    environment:
      LOG_LEVEL: info
      HARBOR_EXPORTER_PORT: 8080
      HARBOR_EXPORTER_METRICS_PATH: /metrics
      HARBOR_EXPORTER_METRICS_ENABLED: "true"
      HARBOR_EXPORTER_MAX_REQUESTS: 30
      HARBOR_EXPORTER_CACHE_TIME: 23
      HARBOR_EXPORTER_CACHE_CLEAN_INTERVAL: 14400
      HARBOR_METRIC_NAMESPACE: harbor
      HARBOR_METRIC_SUBSYSTEM: exporter
      HARBOR_SERVICE_HOST: harbor-core
      HARBOR_SERVICE_PORT: 8080
      HARBOR_SERVICE_SCHEME: http
      HARBOR_REDIS_URL: redis://harbor-redis:6379/2
      HARBOR_REDIS_NAMESPACE: harbor_job_service_namespace
      HARBOR_REDIS_TIMEOUT: 3600
      HARBOR_DATABASE_HOST: harbor-db
      HARBOR_DATABASE_PORT: 5432
      HARBOR_DATABASE_USERNAME: postgres
      HARBOR_DATABASE_PASSWORD: ${HARBOR_DB_PASSWORD}
      HARBOR_DATABASE_DBNAME: registry
      HARBOR_DATABASE_SSLMODE: disable
      HARBOR_DATABASE_MAX_IDLE_CONNS: 50
      HARBOR_DATABASE_MAX_OPEN_CONNS: 100
      HARBOR_DATABASE_CONN_MAX_LIFETIME: 5m
      HARBOR_DATABASE_CONN_MAX_IDLE_TIME: 0
    depends_on:
      harbor-core:
        condition: service_healthy
      harbor-db:
        condition: service_healthy
      harbor-log:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/metrics"]
      interval: 10s
      timeout: 5s
      retries: 30
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "exporter"
    networks:
      - harbor-internal

  harbor-nginx:
    image: goharbor/nginx-photon:v2.15.2@sha256:0ccc1eca228ecea120d7ad9e4386b8e86ced200212f00060a9abc753dbe7f17f
    container_name: harbor-nginx
    restart: "no"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ./config/harbor-nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 30
    depends_on:
      harbor-core:
        condition: service_healthy
      harbor-log:
        condition: service_healthy
      harbor-portal:
        condition: service_healthy
      harbor-registry:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "proxy"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=admin-edge"
      - "traefik.http.routers.harbor.rule=Host(`{{ service_domains.harbor }}`)"
      - "traefik.http.routers.harbor.entrypoints=websecure"
      - "traefik.http.routers.harbor.tls=true"
      - "traefik.http.services.harbor.loadbalancer.server.port=8080"
    networks:
      - admin-edge
      - harbor-internal

networks:
  admin-edge:
    external: true
  harbor-internal:
    external: true
  harbor-egress:
    external: true
  harbor-host:
    external: true
