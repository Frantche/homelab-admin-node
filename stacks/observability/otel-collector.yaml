extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  hostmetrics:
    root_path: /hostfs
    collection_interval: {{ observability.collection_interval | default('30s') }}
    scrapers:
      cpu:
      disk:
      filesystem:
      load:
      memory:
      network:
      paging:
      processes:

  docker_stats:
    endpoint: tcp://otel-socket-proxy:2375
    api_version: "{{ observability.docker_api_version | default('1.40') }}"
    initial_delay: {{ observability.docker_stats_initial_delay | default('30s') }}
    collection_interval: {{ observability.collection_interval | default('30s') }}

  prometheus/gitea:
    config:
      scrape_configs:
        - job_name: gitea
          scrape_interval: {{ observability.service_metrics_interval | default(observability.collection_interval | default('30s')) }}
          metrics_path: /metrics
          static_configs:
            - targets:
                - gitea:3000

  prometheus/harbor:
    config:
      scrape_configs:
        - job_name: harbor-core
          scrape_interval: {{ observability.service_metrics_interval | default(observability.collection_interval | default('30s')) }}
          metrics_path: /metrics
          static_configs:
            - targets:
                - harbor-core:8001
        - job_name: harbor-exporter
          scrape_interval: {{ observability.service_metrics_interval | default(observability.collection_interval | default('30s')) }}
          metrics_path: /metrics
          static_configs:
            - targets:
                - harbor-exporter:8080

  prometheus/openbao:
    config:
      scrape_configs:
        - job_name: openbao
          scrape_interval: {{ observability.service_metrics_interval | default(observability.collection_interval | default('30s')) }}
          metrics_path: /v1/sys/metrics
          params:
            format:
              - prometheus
          static_configs:
            - targets:
                - openbao:8200

  prometheus/traefik:
    config:
      scrape_configs:
        - job_name: traefik
          scrape_interval: {{ observability.service_metrics_interval | default(observability.collection_interval | default('30s')) }}
          metrics_path: /metrics
          static_configs:
            - targets:
                - traefik:8082

  filelog/security:
    include:
      - /var/log/admin-node-security-exceptions.log
    start_at: beginning
    include_file_path: true

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: {{ observability.memory_limit_mib | default(256) }}
  resource:
    attributes:
      - key: service.namespace
        value: homelab-admin-node
        action: upsert
      - key: deployment.environment
        value: "{{ 'ci' if (ci_mode | default(false)) else 'homelab' }}"
        action: upsert
      - key: host.name
        value: "{{ ansible_hostname | default('admin-node') }}"
        action: upsert
  batch:

exporters:
  otlphttp/backend:
    compression: {{ observability.compression | default('gzip') }}
    encoding: {{ observability.otlp_encoding | default('proto') }}
    metrics_endpoint: "{{ observability.metrics_endpoint }}"
    logs_endpoint: "{{ observability.logs_endpoint }}"
{% if observability.headers is defined %}
    headers:
{% for header_name, header_value in observability.headers.items() %}
      {{ header_name }}: "{{ header_value }}"
{% endfor %}
{% endif %}

service:
  extensions:
    - health_check
  pipelines:
    metrics:
      receivers:
        - otlp
        - hostmetrics
        - docker_stats
        - prometheus/gitea
        - prometheus/harbor
        - prometheus/openbao
        - prometheus/traefik
      processors:
        - memory_limiter
        - resource
        - batch
      exporters:
        - otlphttp/backend
    logs:
      receivers:
        - otlp
        - filelog/security
      processors:
        - memory_limiter
        - resource
        - batch
      exporters:
        - otlphttp/backend
