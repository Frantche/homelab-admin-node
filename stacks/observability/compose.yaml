services:
  otel-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2@sha256:bd2241b3bec83abcff25927a0a7ae518e0c5bef624b3cc247dcb31e68b53f417
    container_name: otel-socket-proxy
    restart: "no"
    environment:
      CONTAINERS: "1"
      INFO: "1"
      VERSION: "1"
      POST: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    networks:
      - otel-docker

{% if observability.mock_backend_enabled | default(false) | bool %}
  otel-mock-backend:
    image: python:3.14-alpine@sha256:47f36929d95852c8aa959380eeeea761ba7411ebe793d090da4cd518ac3af237
    container_name: otel-mock-backend
    restart: "no"
    command:
      - python
      - /otel-mock-backend.py
      - --host
      - 0.0.0.0
      - --port
      - "43190"
      - --state-dir
      - /state
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:43190/healthz', timeout=2).read()"
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - {{ admin_repo_root | default('/opt/homelab-admin-node') }}/ci/otel-mock-backend.py:/otel-mock-backend.py:ro
      - {{ observability.mock_state_dir | default('/tmp/admin-node-otel-mock') }}:/state
    networks:
      - admin-edge
      - harbor-internal
      - otel-docker

{% endif %}
  otel-collector:
    image: "{{ observability.collector_image | default('otel/opentelemetry-collector-contrib:0.139.0@sha256:87b591b18a0a330b6246f6d4f53d4867d1b238d1b85a69145e0f4eb38f92154c') }}"
    container_name: otel-collector
    restart: "no"
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m,mode=0700
    command:
      - --config=/etc/otelcol/config.yaml
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otelcol/config.yaml"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - /srv/admin/config/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
      - /proc:/hostfs/proc:ro
      - /sys:/hostfs/sys:ro
      - /var/log/admin-node-security-exceptions.log:/var/log/admin-node-security-exceptions.log:ro
{% if observability.mock_backend_enabled | default(false) | bool %}
    depends_on:
      otel-mock-backend:
        condition: service_healthy
    network_mode: "service:otel-mock-backend"
{% else %}
{% if observability.expose_host_ports | default(false) | bool %}
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
{% endif %}
    networks:
      - admin-edge
      - harbor-internal
      - otel-docker
{% endif %}

networks:
  admin-edge:
    external: true
  harbor-internal:
    external: true
  otel-docker:
    external: true
