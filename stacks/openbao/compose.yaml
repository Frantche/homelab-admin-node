services:
  openbao:
    image: openbao/openbao:2.6.1@sha256:15e90b578c970ae57b596ed51295380cd54f93860fe36758f05b455d71aae0e0
    container_name: openbao
    restart: "no"
    cap_add:
      - IPC_LOCK
{% if (hardening.apparmor.enabled | default(true) | bool) and (admin_apparmor_runtime_active | default(false) | bool) and ((hardening.apparmor.profiles | default({})).openbao | default(true) | bool) %}
    security_opt:
      - "apparmor=admin-node-openbao"
{% endif %}
    environment:
      BAO_LOCAL_CONFIG: |
        disable_mlock = true
    command: server -config=/etc/openbao/openbao.hcl
    volumes:
      - ./openbao.hcl:/etc/openbao/openbao.hcl:ro
      - /srv/admin/data/openbao:/openbao/file
    healthcheck:
      test: ["CMD-SHELL", "BAO_ADDR=http://127.0.0.1:8200 bao status -format=json >/dev/null; rc=$$?; [ $$rc -eq 0 ] || [ $$rc -eq 2 ]"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=admin-edge"
      - "traefik.http.routers.openbao.rule=Host(`{{ service_domains.openbao }}`)"
      - "traefik.http.routers.openbao.entrypoints=websecure"
      - "traefik.http.routers.openbao.tls=true"
      - "traefik.http.services.openbao.loadbalancer.server.port=8200"
    networks:
      - admin-edge

networks:
  admin-edge:
    external: true
