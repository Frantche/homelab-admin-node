services:
  cloudflared:
    image: cloudflare/cloudflared:2026.7.3@sha256:b392761b711c0e5649d9b64e1fc9a10ba0563fa3e712ed7c26bde5cc1fbe9059
    container_name: cloudflared
    restart: "no"
{% if cloudflare_local_ingress_enabled | default(false) | bool %}
    command: tunnel --metrics 0.0.0.0:20241 --config /etc/cloudflared/config.yml run
    volumes:
      - ./config.yml:/etc/cloudflared/config.yml:ro
      - ./credentials.json:/etc/cloudflared/credentials.json:ro
      - /srv/admin/certs/ca.pem:/etc/cloudflared/admin-node-ca.pem:ro
{% else %}
    command: tunnel --metrics 0.0.0.0:20241 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
{% endif %}
{% if (hardening.apparmor.enabled | default(true) | bool) and (admin_apparmor_runtime_active | default(false) | bool) and ((hardening.apparmor.profiles | default({})).cloudflared | default(true) | bool) %}
    security_opt:
      - "apparmor=admin-node-cloudflared"
{% endif %}
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:20241", "ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - admin-edge

networks:
  admin-edge:
    external: true
