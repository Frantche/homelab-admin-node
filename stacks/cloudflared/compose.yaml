services:
  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
{% if (hardening.apparmor.enabled | default(true) | bool) and (admin_apparmor_runtime_active | default(false) | bool) and ((hardening.apparmor.profiles | default({})).cloudflared | default(true) | bool) %}
    security_opt:
      - "apparmor=admin-node-cloudflared"
{% endif %}
    networks:
      - admin-net

networks:
  admin-net:
    external: true
