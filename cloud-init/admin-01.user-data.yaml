#cloud-config
users:
  - name: admin
    groups: [wheel]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - "ssh-ed25519 AAAA_PLACEHOLDER_REPLACE_ME admin@example"

package_update: true
packages:
  - ansible
  - git
  - docker
  - docker-compose
  - openssh
  - rsync
  - sops
  - age
  - restic
  - jq
  - curl
  - python
  - vim

runcmd:
  - [systemctl, enable, --now, sshd]
  - [systemctl, enable, --now, docker]
  - |
    bash -lc '
      set -euo pipefail
      REPO_DIR=/opt/homelab-admin-node
      REPO_URL="${ADMIN_REPO_URL:-https://github.com/Frantche/homelab-admin-node.git}"

      if [[ -d "$REPO_DIR/.git" ]]; then
        git -C "$REPO_DIR" pull --ff-only
      else
        git clone "$REPO_URL" "$REPO_DIR"
      fi

      copy_if_missing() {
        local src="$1"
        local dst="$2"
        local mode="$3"

        if [[ ! -e "$dst" ]]; then
          install -D -m "$mode" "$src" "$dst"
        fi
      }

      copy_if_missing "$REPO_DIR/examples/admin-config/inventory.ini" /etc/admin-config/inventory.ini 0644
      copy_if_missing "$REPO_DIR/examples/admin-config/group_vars/all.yml.example" /etc/admin-config/group_vars/all.yml 0644
      copy_if_missing "$REPO_DIR/examples/admin-config/group_vars/secrets.sops.yaml.example" /etc/admin-config/group_vars/secrets.sops.yaml 0600
      copy_if_missing "$REPO_DIR/examples/admin-config/mode" /etc/admin-config/mode 0644

      install -D -m 0644 "$REPO_DIR/systemd/admin-converge.service" /etc/systemd/system/admin-converge.service
      install -D -m 0644 "$REPO_DIR/systemd/admin-converge.timer" /etc/systemd/system/admin-converge.timer
      install -D -m 0755 "$REPO_DIR/scripts/adminctl" /usr/local/bin/adminctl
    '
  - [systemctl, daemon-reload]
  - [systemctl, enable, --now, admin-converge.timer]
  - [bash, -lc, "systemctl start admin-converge.service || true"]
