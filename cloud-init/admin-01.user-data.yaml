#cloud-config
users:
  - name: admin
    groups: [wheel]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - "ssh-ed25519 AAAA_PLACEHOLDER_REPLACE_ME admin@example"

package_update: true
packages:
  - ansible
  - git
  - docker
  - docker-compose
  - openssh
  - rsync
  - sops
  - age
  - restic
  - jq
  - curl
  - python

write_files:
  - path: /etc/admin-node/mode
    owner: root:root
    permissions: '0644'
    content: |
      locked
  - path: /usr/local/bin/admin-converge.sh
    owner: root:root
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      REPO_DIR="${REPO_DIR:-/opt/homelab-admin-node}"
      SCRIPT_PATH="$REPO_DIR/scripts/admin-converge.sh"
      if [[ -x "$SCRIPT_PATH" ]]; then
        exec "$SCRIPT_PATH"
      fi
      echo "[admin-converge] $SCRIPT_PATH not found"
      echo "[admin-converge] clone the homelab-admin-node repository manually with git CLI into $REPO_DIR"
      echo "[admin-converge] see README.md for clone instructions"
      exit 1
  - path: /etc/systemd/system/admin-converge.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Admin node ansible converge
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/admin-converge.sh
  - path: /etc/systemd/system/admin-converge.timer
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Periodic admin converge

      [Timer]
      OnBootSec=5min
      OnUnitActiveSec=30min
      Unit=admin-converge.service

      [Install]
      WantedBy=timers.target

runcmd:
  - [ mkdir, -p, /etc/admin-node ]
  - [ systemctl, daemon-reload ]
  - [ systemctl, enable, --now, sshd ]
  - [ systemctl, enable, --now, docker ]
  - [ systemctl, enable, --now, admin-converge.timer ]
